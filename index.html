<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anivarya Bajpai</title>
    <meta name="description" content="Official website of Anivarya Bajpai">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        .name-text {
            font-size: 8vw;
            font-weight: 900;
            background: linear-gradient(135deg, #1e293b 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        .bio-text {
            font-size: 1.25rem;
            color: #475569; 
            font-weight: 400;
            line-height: 1.8;
            max-width: 600px;
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.7);
            padding: 24px 40px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        @media (max-width: 640px) {
            .bio-text {
                font-size: 1rem;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="name-text">ANIVARYA BAJPAI</div>
    
    <div class="bio-text">
        14 years old | Living life my way.<br>
        Cricket is my rhythm, Virat Kohli is the vibe.<br>
        Born to bleed Red—RCB fan for life.
    </div>

    <!-- Live Post Display Area (Jo user post karega woh yahan dikhega) -->
    <div id="post-display" class="hidden w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col items-center mb-6">
        <img id="posted-image" src="" alt="Profile Photo" class="w-32 h-32 object-cover rounded-full border-4 border-slate-100 shadow-md mx-auto mb-4">
        <div id="posted-desc" class="text-slate-700 font-medium text-lg text-center bg-slate-50 p-4 rounded-xl w-full border border-slate-100"></div>
    </div>

    <!-- Input Form Area -->
    <div id="upload-form" class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2 text-left">1. Choose Photo</label>
            <input type="file" id="image-input" accept="image/*" 
                class="block w-full text-sm text-slate-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-slate-900 file:text-white
                hover:file:bg-slate-800
                cursor-pointer file:cursor-pointer transition-all" />
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2 text-left">2. Write Description</label>
            <textarea id="desc-input" placeholder="Apne baare me kuch likho..." rows="3" 
                class="w-full text-sm text-slate-700 p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900 resize-none"></textarea>
        </div>

        <button id="post-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 px-4 rounded-xl transition-all shadow-md">
            Post Now
        </button>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const descInput = document.getElementById('desc-input');
        const postBtn = document.getElementById('post-btn');
        
        const postDisplay = document.getElementById('post-display');
        const postedImage = document.getElementById('posted-image');
        const postedDesc = document.getElementById('posted-desc');
        const uploadForm = document.getElementById('upload-form');

        let imageDataUrl = "";

        // Handle Image Selection
        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageDataUrl = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Post Button Click
        postBtn.addEventListener('click', function() {
            const descText = descInput.value.trim();

            if (!imageDataUrl) {
                alert("Please select a photo first!");
                return;
            }
            if (!descText) {
                alert("Please write a description!");
                return;
            }

            // Save to LocalStorage ताकि Refresh करने पर गायब न हो
            localStorage.setItem('savedImage', imageDataUrl);
            localStorage.setItem('savedDesc', descText);

            // UI Update
            showPost(imageDataUrl, descText);
        });

        // Function to Show Post and Hide Form
        function showPost(img, desc) {
            postedImage.src = img;
            postedDesc.innerText = desc;
            postDisplay.classList.remove('hidden');
            uploadForm.classList.add('hidden'); // Form ko hide kar dega post hone ke baad
        }

        // Check if data already exists when page loads
        window.addEventListener('DOMContentLoaded', () => {
            const savedImg = localStorage.getItem('savedImage');
            const savedDesc = localStorage.getItem('savedDesc');

            if (savedImg && savedDesc) {
                showPost(savedImg, savedDesc);
            }
        });
    </script>

</body>
</html>
