<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANIVARYA BAJPAI | AI STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white p-5 md:p-10 font-sans">

    <!-- Header -->
    <header class="py-20 text-center">
        <h1 class="text-7xl md:text-[12rem] font-black tracking-tighter uppercase leading-none">Anivarya <br> Bajpai</h1>
    </header>

    <!-- Generator -->
    <div class="max-w-xl mx-auto glass p-10 rounded-[2rem] mb-20 border border-white/10 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6">Create Your Project</h2>
        <input type="text" id="userName" placeholder="Your Full Name" class="w-full p-4 mb-4 rounded-xl bg-white/10 text-white border border-white/20 outline-none">
        <textarea id="userIdea" placeholder="Describe your 3D idea..." class="w-full p-4 mb-4 rounded-xl bg-white/10 text-white border border-white/20 outline-none h-32"></textarea>
        <button onclick="submitRequest()" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 transition-all">GENERATE REQUEST</button>
    </div>

    <!-- Gallery -->
    <h2 class="text-4xl font-black text-center mb-10 tracking-tight">PROJECT GALLERY</h2>
    <div id="galleryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>

    <!-- Host Panel (HIDDEN from others, remove 'hidden' class to see it) -->
    <div id="hostPanel" class="max-w-2xl mx-auto mt-20 p-8 glass rounded-3xl border border-red-500/30 hidden">
        <h3 class="font-bold text-red-500 mb-4 uppercase">Host Panel (Admin Only)</h3>
        <input type="text" id="imgUrl" placeholder="Image Direct Link..." class="w-full p-3 mb-2 rounded-lg bg-black text-white border border-white/10">
        <input type="text" id="imgTitle" placeholder="Project Title" class="w-full p-3 mb-4 rounded-lg bg-black text-white border border-white/10">
        <button onclick="uploadProject()" class="bg-red-600 w-full text-white py-3 rounded-lg font-bold">UPLOAD TO GALLERY</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = { /* ... tumhari config wahi rahegi ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.submitRequest = async () => {
            const name = document.getElementById('userName').value;
            const idea = document.getElementById('userIdea').value;
            if(!name) return alert("Naam likho!");
            await addDoc(collection(db, "projects"), { name, idea, type: 'request' });
            alert("Request sent successfully!");
        };

        window.uploadProject = async () => {
            const image = document.getElementById('imgUrl').value;
            const title = document.getElementById('imgTitle').value;
            await addDoc(collection(db, "projects"), { image, title, type: 'gallery' });
            alert("Added!");
        };

        onSnapshot(collection(db, "projects"), (snapshot) => {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === 'gallery') {
                    container.innerHTML += `<div class="fade-in p-4 glass rounded-3xl border border-white/10"><img src="${d.image}" class="w-full h-80 object-cover rounded-2xl"><h4 class="font-bold text-center py-4">${d.title}</h4></div>`;
                } else {
                    container.innerHTML += `<div class="fade-in p-8 glass rounded-3xl border border-white/10"><h4 class="font-bold text-lg">${d.name}</h4><p class="text-gray-400 mt-2">${d.idea}</p></div>`;
                }
            });
        });
    </script>
</body>
</html>
