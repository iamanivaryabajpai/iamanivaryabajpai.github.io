<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LucknowPulse | Anivarya Bajpai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <nav class="p-6 text-center text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        LUCKNOW PULSE
    </nav>

    <main class="max-w-5xl mx-auto p-4">
        <!-- Hero Section -->
        <div class="relative rounded-3xl overflow-hidden h-64 shadow-2xl">
            <img src="https://images.unsplash.com/photo-1596706037885-303e8f85f392?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80" class="w-full h-full object-cover opacity-60">
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <h1 class="text-3xl font-bold">Innovation Hub Lucknow</h1>
                <p class="text-sm">Curated by Anivarya Bajpai</p>
            </div>
        </div>

        <!-- Dynamic Grid -->
        <section class="grid md:grid-cols-3 gap-6 mt-10">
            <!-- Trending Box -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-blue-500 transition">
                <h2 class="text-xl font-bold mb-4 text-blue-400">Trending Now</h2>
                <ul class="space-y-2 text-sm">
                    <li>• AI City Tech Roadmap</li>
                    <li>• Lucknow Street Food Guide</li>
                    <li>• Smart Energy Solutions</li>
                </ul>
            </div>
            <!-- Links Box -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-emerald-500 transition">
                <h2 class="text-xl font-bold mb-4 text-emerald-400">Useful Links</h2>
                <a href="https://up.gov.in" class="block hover:text-emerald-300">UP Government Portal</a>
                <a href="https://lucknow.nic.in" class="block hover:text-emerald-300">District Administration</a>
            </div>
            <!-- Contact -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-purple-500 transition">
                <h2 class="text-xl font-bold mb-4 text-purple-400">Let's Connect</h2>
                <p class="text-xs italic">Building the future of Lucknow, one code at a time.</p>
            </div>
        </section>
    </main>

</body>
</html>
