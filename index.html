<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivarya Bajpai | AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-10">

    <header class="max-w-7xl mx-auto text-center py-10">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter">ANIVARYA BAJPAI</h1>
    </header>

    <div class="max-w-3xl mx-auto bg-gray-50 p-10 rounded-3xl mb-20">
        <h2 class="text-2xl font-bold mb-6">Generate Your Idea</h2>
        <input type="text" id="userName" placeholder="Your Name" class="w-full p-4 mb-4 rounded-xl border">
        <textarea id="userIdea" placeholder="Describe your 3D idea..." class="w-full p-4 mb-4 rounded-xl border h-32"></textarea>
        <button onclick="submitRequest()" class="bg-black text-white px-10 py-4 rounded-full font-bold">GENERATE REQUEST</button>
    </div>

    <h2 class="text-3xl font-bold text-center mb-10">3D Project Gallery</h2>
    <div id="galleryContainer" class="grid md:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>

    <div class="max-w-3xl mx-auto mt-20 p-10 bg-red-50 rounded-3xl border-2 border-red-200">
        <h3 class="font-bold text-red-600 mb-4">HOST PANEL (Add Image URL)</h3>
        <input type="text" id="imgUrl" placeholder="Paste Direct Image Link..." class="w-full p-4 mb-4 rounded-xl border">
        <input type="text" id="imgTitle" placeholder="Project Title" class="w-full p-4 mb-4 rounded-xl border">
        <button onclick="uploadProject()" class="bg-red-600 text-white px-10 py-4 rounded-xl font-bold">ADD TO GALLERY</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0cnfHQugICJ6GpYCmYDvjjxbf001fks8",
            authDomain: "weee-35c80.firebaseapp.com",
            projectId: "weee-35c80",
            storageBucket: "weee-35c80.firebasestorage.app",
            messagingSenderId: "835643616336",
            appId: "1:835643616336:web:a974eee55dd87ch4cb555",
            measurementId: "G-NZTH3GK42Q"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // Submit Request
        window.submitRequest = async () => {
            const name = document.getElementById('userName').value;
            const idea = document.getElementById('userIdea').value;
            await addDoc(collection(db, "projects"), { name, idea, type: 'request' });
            alert("Request sent!");
        };

        // Upload Gallery
        window.uploadProject = async () => {
            const url = document.getElementById('imgUrl').value;
            const title = document.getElementById('imgTitle').value;
            await addDoc(collection(db, "projects"), { image: url, title: title, type: 'gallery' });
            alert("Added to gallery!");
        };

        // Fetch & Merge Data
        onSnapshot(collection(db, "projects"), (snapshot) => {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === 'gallery') {
                    container.innerHTML += `<div class="p-4 border rounded-2xl shadow-sm"><img src="${d.image}" class="w-full h-48 object-cover rounded-xl mb-4" onerror="this.style.display='none'"><h4 class="font-bold">${d.title}</h4></div>`;
                } else {
                    container.innerHTML += `<div class="p-4 border rounded-2xl bg-gray-50"><h4 class="font-bold">${d.name}</h4><p class="text-sm">${d.idea}</p></div>`;
                }
            });
        });
    </script>
</body>
</html>
