<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LucknowPulse | The Ultimate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* RCB & Pixelated Minecraft Background Mix */
        body {
            background: linear-gradient(135deg, #ec1d24, #fdb913, #222);
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.3) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(0,0,0,0.3) 25%, transparent 25%),
                url('https://wallpaperaccess.com/full/1563721.jpg'); /* Virat Kohli Hero Image */
            background-blend-mode: overlay;
            background-size: 50px 50px, 50px 50px, cover;
            min-height: 100vh;
            color: white;
            font-family: 'Courier New', monospace; /* Pixelated Math Vibe */
        }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-5">

    <div class="max-w-4xl mx-auto glass p-10 rounded-3xl text-center">
        <h1 class="text-6xl font-black mb-4 tracking-tighter">LUCKNOW PULSE</h1>
        <p class="text-2xl mb-8 border-b-2 border-yellow-500 pb-4">"Maths, Minecraft, and Virat Kohli's Grit."</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
            <div class="p-6 bg-red-600 rounded-xl font-bold">RCB SPIRIT: PLAY BOLD</div>
            <div class="p-6 bg-blue-600 rounded-xl font-bold">MINECRAFT: BUILD LEGENDS</div>
            <div class="p-6 bg-yellow-500 text-black rounded-xl font-bold">MATHS: SOLVE THE IMPOSSIBLE</div>
            <div class="p-6 bg-green-600 rounded-xl font-bold">VIRAT: THE GOAT</div>
        </div>
    </div>

</body>
</html>
