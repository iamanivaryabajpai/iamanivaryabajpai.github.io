<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SUPREME FEED SYSTEM</title>
    
    <!-- Premium Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #fafafa;
            color: #000000;
        }
        .premium-blur {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .cool-shadow {
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .custom-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .custom-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="font-sans antialiased pb-24">

    <!-- TOP GLOWING HEADER -->
    <header class="sticky top-0 z-50 premium-blur border-b border-zinc-100 px-6 py-4">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-red-500 animate-pulse"></span>
                <h1 class="text-xl font-extrabold tracking-tighter font-mono">CORE.NETWORK //</h1>
            </div>
            <div class="bg-black text-white text-[10px] font-mono px-3 py-1 rounded-full uppercase tracking-wider shadow-md">
                Data Safe Mode
            </div>
        </div>
    </header>

    <!-- MAIN PLATFORM HUB -->
    <main class="max-w-xl mx-auto px-4 mt-6 space-y-6">

        <!-- COOL POST CREATOR MATRIX -->
        <div class="bg-white rounded-[28px] p-5 custom-card cool-shadow space-y-4">
            <h3 class="text-xs font-mono font-bold text-zinc-400 uppercase tracking-widest">// Inject New Post</h3>
            
            <div class="space-y-3">
                <textarea id="post-caption" rows="2" placeholder="Kya chal raha hai dimag me? Kuch khatarnak likho..." class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl p-4 text-sm font-medium outline-none focus:border-black focus:bg-white transition-all resize-none"></textarea>
                
                <!-- IMAGE UPLOAD CONTROLLER -->
                <div class="flex items-center justify-between gap-2">
                    <label class="flex-1 bg-zinc-50 hover:bg-zinc-100 border border-zinc-200 border-dashed rounded-xl p-3 text-center cursor-pointer transition-all">
                        <input type="file" id="post-image" accept="image/*" class="hidden">
                        <span id="upload-status-text" class="text-xs font-semibold text-zinc-500">📸 Add Cool Image</span>
                    </label>
                    
                    <button onclick="publishNewPost()" class="bg-black hover:bg-zinc-900 text-white font-extrabold text-xs px-6 py-4.5 rounded-xl transition-all transform active:scale-95 shadow-lg">
                        Publish Post ⚡
                    </button>
                </div>
            </div>
        </div>

        <!-- DYNAMIC STREAM FEED TARGET -->
        <div id="feed-container" class="space-y-6">
            <!-- Posts automatically yahan load honge -->
        </div>

    </main>

    <!-- CORE REPLICATION LOGIC ENGINE -->
    <script>
        // System Base Schema Map
        let systemDataStore = {
            posts: [
                {
                    id: 1,
                    author: "Anivarya",
                    caption: "Yeh hai bilkul clean aur simple UI. Isme post upload bhi hoga aur page refresh karne par tumhaara data kabhi delete nahi hoga! Try karke dekho. 🔥",
                    image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80",
                    likes: 12
                }
            ]
        };

        // Screen Boot Trigger
        document.addEventListener("DOMContentLoaded", () => {
            // Check if data exists in LocalStorage
            const localSavedData = localStorage.getItem("supreme_feed_data");
            if (localSavedData) {
                systemDataStore = JSON.parse(localSavedData);
            } else {
                saveDataToLocalStorage();
            }

            // Image file select listener to update UI text
            document.getElementById("post-image").addEventListener("change", function() {
                if (this.files && this.files[0]) {
                    document.getElementById("upload-status-text").innerText = `✅ Attached: ${this.files[0].name.substring(0, 15)}...`;
                }
            });

            renderFeed();
        });

        // Save State into LocalStorage Block
        function saveDataToLocalStorage() {
            localStorage.setItem("supreme_feed_data", JSON.stringify(systemDataStore));
        }

        // Render Feed Elements
        function renderFeed() {
            const feedContainer = document.getElementById("feed-container");
            feedContainer.innerHTML = "";

            if (systemDataStore.posts.length === 0) {
                feedContainer.innerHTML = `
                    <div class="text-center py-12 text-zinc-400 text-xs font-mono uppercase tracking-wider">
                        No feeds found inside local data cache memory.
                    </div>
                `;
                return;
            }

            systemDataStore.posts.forEach((post, index) => {
                const postCard = document.createElement("article");
                postCard.className = "bg-white rounded-[32px] overflow-hidden custom-card cool-shadow";

                let imageTag = post.image 
                    ? `<div class="border-b border-zinc-100"><img src="${post.image}" class="w-full h-auto max-h-96 object-cover"></div>` 
                    : '';

                postCard.innerHTML = `
                    <!-- Post Header -->
                    <div class="px-5 py-4 flex items-center justify-between border-b border-zinc-50">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl bg-black text-white font-mono font-bold text-xs flex items-center justify-center uppercase">
                                ${post.author[0]}
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-black uppercase font-mono">@${post.author}</h4>
                                <span class="text-[9px] font-mono text-zinc-400 block">System Core Verified</span>
                            </div>
                        </div>
                        <button onclick="deletePostByIndex(${index})" class="text-zinc-300 hover:text-red-500 text-xs font-bold transition-all px-2 py-1">✕ Delete</button>
                    </div>

                    <!-- Post Image Content -->
                    ${imageTag}

                    <!-- Post Caption Body -->
                    <div class="p-6 text-sm font-medium text-zinc-800 leading-relaxed">
                        ${post.caption}
                    </div>

                    <!-- Post Interaction Action Footer Row -->
                    <div class="px-5 py-3.5 bg-zinc-50/50 flex items-center justify-between border-t border-zinc-100/40">
                        <button onclick="likePostByIndex(${index})" class="flex items-center gap-1.5 text-xs font-bold text-zinc-500 hover:text-black transition-all">
                            <span>⚡</span>
                            <span class="font-mono text-black">Flux Like (${post.likes || 0})</span>
                        </button>
                        <span class="text-[9px] font-mono font-bold text-zinc-400 tracking-wider">LOCAL DATA LOG</span>
                    </div>
                `;
                feedContainer.appendChild(postCard);
            });
        }

        // Publish New Post System Logic
        function publishNewPost() {
            const captionInput = document.getElementById("post-caption");
            const imageInput = document.getElementById("post-image");
            
            const captionText = captionInput.value.trim();
            if (!captionText) {
                alert("Bhai, caption me kuch toh solid likho pehle!");
                return;
            }

            const imageFile = imageInput.files[0];

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Injecting new object block with base64 encoded local image source link data parameters
                    pushPostObjectData(captionText, e.target.result);
                };
                reader.readAsDataURL(imageFile);
            } else {
                pushPostObjectData(captionText, null);
            }
        }

        function pushPostObjectData(caption, base64Image) {
            const newPostObj = {
                id: Date.now(),
                author: "Anivarya",
                caption: caption,
                image: base64Image,
                likes: 0
            };

            systemDataStore.posts.unshift(newPostObj);
            saveDataToLocalStorage();
            renderFeed();

            // Resetting Inputs Fields Form Controls Elements 
            document.getElementById("post-caption").value = "";
            document.getElementById("post-image").value = "";
            document.getElementById("upload-status-text").innerText = "📸 Add Cool Image";
        }

        // Like Increment Trigger Engine Handler
        function likePostByIndex(index) {
            systemDataStore.posts[index].likes = (systemDataStore.posts[index].likes || 0) + 1;
            saveDataToLocalStorage();
            renderFeed();
        }

        // Delete Element Handler Loop Map Matrix
        function deletePostByIndex(index) {
            if (confirm("Kya aap sach me is post ko system data logs se delete karna chahte hain?")) {
                systemDataStore.posts.splice(index, 1);
                saveDataToLocalStorage();
                renderFeed();
            }
        }
    </script>
</body>
</html>
