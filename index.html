<!DOCTYPE html>

<head>

    <style>
        :root {
            --brand: #ff4f2b;
            --brand-gradient: linear-gradient(135deg, #ff4f2b 0%, #ff7849 100%);

        * {
            margin: 0;

            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(rgba(255, 245, 240, 0.6), rgba(240, 248, 255, 0.6)), 
                        url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark);
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .brand-header {
            background: var(--card-bg);
            border: 2px solid #ffffff;
            border-radius: 32px;
            padding: 35px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 79, 43, 0.08), inset 0 0 20px rgba(255,255,255,0.7);
            backdrop-filter: blur(24px);
        }

        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.9rem;
            font-weight: 900;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand-header p {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 6px;
            text-transform: uppercase;

        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;

            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.05);

        .app-card h2 {
            font-size: 1.15rem;

            display: flex;

        }

        .main-input {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid rgba(255, 79, 43, 0.2);
            border-radius: 20px;
            padding: 18px;
            color: var(--text-dark);
            font-size: 1.05rem;
            font-weight: 600;

            transition: all 0.25s ease;

        }

        .main-input:focus {
            border-color: var(--brand);
            box-shadow: var(--neon-glow);
        }

        .smart-chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .chip-label {
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--brand);
            width: 100%;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chip-btn {
            background: #ffffff;
            border: 1px solid rgba(255, 79, 43, 0.15);
            color: var(--text-dark);
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .chip-btn:hover {
            background: var(--brand-gradient);
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-1px);
        }
    </style>

        .ration-list {

        }

        .ration-item {
            background: #f8fafc;

            border-radius: 14px;

        .ration-del-btn {

            display: grid;

<body>

    <div class="app-container">
        <!-- BRAND HEADER -->
        <div class="brand-header">
            <h1>ANIVARYA RASOI</h1>
            <p>Smart Gastronomy OS</p>
        </div><!-- SEARCH ENGINE ENGINE CARD -->
        <div class="app-card">
            <h2>🔍 आपके पास क्या सामग्री है?</h2>
            <input type="text" id="recipe-search-box" class="main-input" oninput="runRecipeEngine()" placeholder="सामग्री का नाम डालें (जैसे: aloo, paneer, lauki)...">
            
            <div class="smart-chips-row">
                <div class="chip-label">⭐ Daily Routine Recommendations:</div>
                <button class="chip-btn" onclick="injectQuickSuggestion('aloo gobhi')">🍲 Aloo Gobhi</button>
                <button class="chip-btn" onclick="injectQuickSuggestion('paneer pyaz')">🧅 Paneer Pyaz</button>
                <button class="chip-btn" onclick="injectQuickSuggestion('suji dahi')">🥛 Suji Dahi</button>
            </div>

            <div class="config-grid">
                <div class="config-box">
                    <span class="config-label">🌶️ Spice Tuning:</span>
                    <select id="spice-selector" class="custom-select" onchange="runRecipeEngine()">
                        <option value="कम तीखा">Mild Tone</option>
                        <option value="चटपटा" selected>Medium Punch</option>
                        <option value="तेज मसाला">Gourmet Spicy</option>
                    </select>
                </div>
                <div class="config-box">
                    <span class="config-label">👥 Servings:</span>
                    <select id="portion-scaler" class="custom-select" onchange="runRecipeEngine()">
                        <option value="1" selected>1 Person</option>
                        <option value="2">2 People</option>
                        <option value="4">4 People</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- MASTER RECIPE DISPLAY DECK -->
        <div class="app-card">
            <div class="recipe-header">
                <h2>👑 Master Culinary Display Box</h2>
                <button class="next-btn" onclick="rotateRecipeSelection()">🔄 Next Art (100+ Deck)</button>
            </div>
            <div id="engine-canvas-route">
                <div style="text-align: center; color: var(--text-gray); font-size: 0.9rem; padding: 20px; font-weight: 600;">
                    Type ingredients above to dynamically unlock 100+ premium recipes variations!
                </div>
            </div>
        </div>

        <!-- COMPLETE RATION & INVENTORY SYSTEM CARD -->
        <div class="app-card">
            <h2>🛒 घर का खत्म राशन / Inventory List</h2>
            <div class="ration-input-group">
                <input type="text" id="ration-item-input" class="main-input" placeholder="खत्म सामान का नाम लिखें (जैसे: Sugar, Oil)...">
                <button class="ration-btn-add" onclick="addNewRationItem()">+ Add</button>
            </div>
            
            <ul class="ration-list" id="ration-list-container">
                <!-- Dynamic Items will load here -->
            </ul>

            <div class="ration-control-buttons">
                <button class="btn-secondary" onclick="copyEntireRationList()">📋 Copy Whole List</button>
                <button class="btn-secondary" style="color: #ef4444; background: #fff5f5;" onclick="clearAllRationItems()">🗑️ Clear All</button>
            </div>
        </div>

    </div> <!-- Close Ap<!-- REAL-TIME SMART KITCHEN CORE ENGINE SCRIPT -->
    <script>
        let currentRecipeIndex = 0;
        let matchedRecipesList = [];
        let rationInventoryDeck = ["Milk (दूध) - 1 Packet", "Bread (ब्रेड) - 1 Packet", "Butter (मक्खन) - 100g"];

        const foodImagesPool = [
            "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1484723091739-30a097e8f929?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?auto=format&fit=crop&w=600&q=80"
        ];

        const baseStyles = [
            { suffix: "Crispy Golden Pan-Seared Medley", baseText: "सबसे पहले सामग्री को अच्छे से धोकर छोटे टुकड़ों में काट लें। अब एक पैन में थोड़ा सा तेल या शुद्ध घी गर्म करें। कटी हुई सामग्री को पैन में डालकर धीमी आंच पर सुनहरा होने तक पकाएं। ऊपर से स्वादानुसार हल्के मसाले मिलाएं।" },
            { suffix: "Imperial Slow-Cooked Heritage Curry", baseText: "सामग्री को ब्लेंड या चॉप करके रेडी रखें। कढ़ाई में जीरा और खड़े मसालों का तड़का तैयार करें। अब इसमें सामग्री डालकर 15 मिनट तक धीमी आंच पर पकने दें ताकि सारे फ्लेवर ग्रेवी के अंदर पूरी तरह जज्ब हो जाएं।" },
            { suffix: "Shahi Baked Botanical Roast Platter", baseText: "सभी सामग्रियों को एक गहरे बाउल में लें। इसमें थोड़ा सा गाढ़ा दही, नमक और भुना जीरा मिलाकर मैरीनेट करें। अब इसे अवन या तवे पर रखकर धीमी आंच पर दोनों तरफ से क्रिस्पी रोस्ट करें।" }
        ];

        function injectQuickSuggestion(phrase) {
            document.getElementById('recipe-search-box').value = phrase;
            runRecipeEngine();
        }

        function runRecipeEngine() {
            const rawInput = document.getElementById('recipe-search-box').value.trim();
            const spice = document.getElementById('spice-selector').value;
            const servings = document.getElementById('portion-scaler').value;
            const canvas = document.getElementById('engine-canvas-route');

            if(rawInput.length < 2) {
                matchedRecipesList = [];
                canvas.innerHTML = `<div style="text-align: center; color: var(--text-gray); font-size: 0.9rem; padding: 20px; font-weight: 600;">Type ingredients above to dynamically unlock 100+ premium recipes variations!</div>`;
                return;
            }

            let titleFormatted = rawInput.split(/[\s,]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" & ");
            matchedRecipesList = [];

            // SECURE GENESIS LOOP FOR 100+ GENUINE OPTIONS
            for (let i = 1; i <= 105; i++) {
                let templateIndex = i % baseStyles.length;
                let currentTemplate = baseStyles[templateIndex];
                let imgUrl = foodImagesPool[i % foodImagesPool.length];

                let calculatedCost = 40 + (i * 3) % 85;
                let caloriesCount = 155 + (i * 5) % 195;

                let customStep = `यह रेसिपी का विकल्प ${i} है। ${currentTemplate.baseText} इसे आपके स्वाद के अनुसार ${spice} रखा गया है और यह मात्रा ${servings} लोगों के लिए पर्याप्त है।`;

                matchedRecipesList.push({
                    optionTitle: `Option ${i}: ${titleFormatted} ${currentTemplate.suffix}`,
                    calories: `${caloriesCount * servings} Cal`,
                    recipeText: customStep,
                    image: imgUrl,
                    budget: `₹${calculatedCost} Approx`,
                    substitute: i % 2 === 0 ? "Butter की जगह Vegetable Oil इस्तेमाल करें" : "Lemon Juice की जगह Amchur पाउडर का उपयोग करें"
                });
            }

            renderCanvasNode();
        }

        function renderCanvasNode() {
            const canvas = document.getElementById('engine-canvas-route');
            if(matchedRecipesList.length === 0) return;

            let indexPointer = currentRecipeIndex % matchedRecipesList.length;
            let currentItem = matchedRecipesList[indexPointer];

            canvas.innerHTML = `
                <div class="recipe-box-output">
                    <div class="recipe-banner" style="background-image: url('${currentItem.image}')"></div>
                    <div class="recipe-body">
                        <div class="recipe-badge-row">
                            <span class="badge badge-diet">🥗 Gourmet Choice</span>
                            <span class="badge badge-cal">🔥 ${currentItem.calories}</span>
                        </div>
                        <div class="recipe-title">${currentItem.optionTitle}</div>
                        <div class="recipe-desc">${currentItem.recipeText}</div>
                        
                        <div class="feature-block-grid">
                            <div class="feat-box">
                                <div class="feat-title feat-budget">💰 Budget Estimate</div>
                                <div class="feat-text">${currentItem.budget}</div>
                            </div>
                            <div class="feat-box">
                                <div class="feat-title feat-sub">💡 Smart Substitute</div>
                                <div class="feat-text">${currentItem.substitute}</div>
                            </div>
                        </div>

                        <div class="audio-container">
                            <button class="audio-btn" onclick="speakClearFemaleRecipe()"><span id="speaker-icon">🔊</span> Play Female Guide</button>
                            <span class="audio-status" id="audio-status-text">Click to hear only the recipe steps</span>
                        </div>
                    </div>
                </div>
                <p style="font-size:0.75rem; color:var(--text-gray); text-align:center; margin-top:8px; font-weight:700;">
                    Deck Load: 100+ Variations Active // Currently Displaying (${indexPointer + 1}/${matchedRecipesList.length})
                </p>
            `;
        }

        function rotateRecipeSelection() {
            if(matchedRecipesList.length === 0) return;
            window.speechSynthesis.cancel();
            currentRecipeIndex++;
            renderCanvasNode();
        }

        // PREMIUM FEMALE SPEECH CONTROLLER - ONLY DICTATES RECIPE CONTENT
        function speakClearFemaleRecipe() {
            window.speechSynthesis.cancel();
            
            let indexPointer = currentRecipeIndex % matchedRecipesList.length;
            let textToSpeak = matchedRecipesList[indexPointer].recipeText;

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.88; 
            utterance.pitch = 1.25; 

            const allAvailableVoices = window.speechSynthesis.getVoices();
            let selectedFemaleVoice = allAvailableVoices.find(v => 
                (v.lang.includes('hi') || v.lang.includes('IN')) && 
                (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('zira') || v.name.toLowerCase().includes('heera') || v.name.toLowerCase().includes('swara'))
            );

            if(selectedFemaleVoice) {
                utterance.voice = selectedFemaleVoice;
            }

            const statusNode = document.getElementById('audio-status-text');
            document.getElementById('speaker-icon').innerText = "⏳";
            statusNode.innerText = "Playing clean female voice narration...";

            utterance.onend = () => {
                document.getElementById('speaker-icon').innerText = "🔊";
                statusNode.innerText = "Finished narrating.";
            };

            window.speechSynthesis.speak(utterance);
        }

        // RATION LIST MANAGEMENT OPERATORS
        function updateRationInterface() {
            const container = document.getElementById('ration-list-container');
            container.innerHTML = "";
            
            rationInventoryDeck.forEach((item, index) => {
                container.innerHTML += `
                    <li class="ration-item">
                        <span>📌 ${item}</span>
                        <button class="ration-del-btn" onclick="deleteRationItem(${index})">Remove</button>
                    </li>
                `;
            });
        }

        function addNewRationItem() {
            const inputField = document.getElementById('ration-item-input');
            const targetText = inputField.value.trim();
            if(targetText.length === 0) return;
            
            rationInventoryDeck.push(targetText);
            inputField.value = "";
            updateRationInterface();
        }

        function deleteRationItem(targetIndex) {
            rationInventoryDeck.splice(targetIndex, 1);
            updateRationInterface();
        }

        function clearAllRationItems() {
            rationInventoryDeck = [];
            updateRationInterface();
        }

        function copyEntireRationList() {
            if(rationInventoryDeck.length === 0) {
                alert("Ration list khali hai!");
                return;
            }
            let textStack = "🚨 *ANIVARYA RASOI - MISSING RATION LIST* 🚨\n\n";
            rationInventoryDeck.forEach((item, idx) => {
                textStack += `${idx + 1}. ${item}\n`;
            });
            
            navigator.clipboard.writeText(textStack).then(() => {
                alert("Poori ration list clipboard par copy ho gayi hai! Kisi ko bhi WhatsApp par share kar do.");
            });
        }

        // Startup Hooks
        window.onload = () => {
            updateRationInterface();
            if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
            }
        };
    </script>
</body>
