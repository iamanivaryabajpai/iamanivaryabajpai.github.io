<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anivarya Bajpai</title>
    <meta name="description" content="Official website of Anivarya Bajpai">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        .name-text {
            font-size: 8vw;
            font-weight: 900;
            background: linear-gradient(135deg, #1e293b 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        .bio-text {
            font-size: 1.25rem;
            color: #475569; 
            font-weight: 400;
            line-height: 1.8;
            max-width: 600px;
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.7);
            padding: 24px 40px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        @media (max-width: 640px) {
            .bio-text {
                font-size: 1rem;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="name-text">ANIVARYA BAJPAI</div>
    
    <div class="bio-text">
        14 years old | Living life my way.<br>
        Cricket is my rhythm, Virat Kohli is the vibe.<br>
        Born to bleed Red—RCB fan for life.
    </div>

    <!-- Image Upload & Preview Container -->
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col items-center">
        
        <!-- Live Image Preview Area (Hidden by default, shown via JavaScript) -->
        <div id="preview-container" class="hidden mb-4">
            <img id="image-preview" src="" alt="Uploaded Photo" class="w-32 h-32 object-cover rounded-full border-4 border-slate-100 shadow-md mx-auto">
        </div>

        <label class="block text-sm font-semibold text-slate-700 mb-3">Upload your photo</label>
        <input type="file" id="image-input" accept="image/*" 
            class="block w-full text-sm text-slate-500
            file:mr-4 file:py-2 file:px-4
            file:rounded-full file:border-0
            file:text-sm file:font-semibold
            file:bg-slate-900 file:text-white
            hover:file:bg-slate-800
            cursor-pointer file:cursor-pointer transition-all" />
    </div>

    <!-- Corrected JavaScript for handling files -->
    <script>
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');
        const previewContainer = document.getElementById('preview-container');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                };
                
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
