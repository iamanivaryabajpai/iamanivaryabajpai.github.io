<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anivarya Bajpai</title>
    <meta name="description" content="Official website of Anivarya Bajpai">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            /* Subtle modern radial background instead of a flat harsh white */
            background: radial-gradient(circle at center, #ffffff 0%, #f8fafc 100%); 
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .name-text {
            font-size: 8vw;
            font-weight: 900;
            /* Premium dark text gradient */
            background: linear-gradient(135deg, #1e293b 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 24px;
            letter-spacing: -0.02em; /* Sleek, tight letter spacing for large titles */
        }
        .bio-text {
            font-size: 1.25rem;
            color: #475569; /* Softer slate grey for premium readability */
            font-weight: 400;
            line-height: 1.8;
            max-width: 600px;
            letter-spacing: 0.01em;
            /* Elegant, soft box shadow layout to center the focus */
            background: rgba(255, 255, 255, 0.7);
            padding: 24px 40px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        /* Mobile optimization for text size */
        @media (max-width: 640px) {
            .bio-text {
                font-size: 1rem;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="name-text">ANIVARYA BAJPAI</div>
    <div class="bio-text">
        14 years old | Living life my way.<br>
        Cricket is my rhythm, Virat Kohli is the vibe.<br>
        Born to bleed Red—RCB fan for life.
    </div>

</body>
</html>
