<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANIVARYA BAJPAI | AI STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white text-gray-900 selection:bg-black selection:text-white">

    <!-- Header -->
    <header class="py-20 text-center">
        <h1 class="text-7xl md:text-[10rem] font-black tracking-tighter uppercase leading-none">Anivarya <br> Bajpai</h1>
        <p class="text-xl mt-4 text-gray-500 font-light">AI GENERATIVE STUDIO</p>
    </header>

    <!-- Generator Section -->
    <div class="max-w-xl mx-auto bg-black p-10 rounded-[2rem] mb-20 shadow-2xl">
        <h2 class="text-white text-2xl font-bold mb-6">Create Your Project</h2>
        <input type="text" id="userName" placeholder="Your Name" class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white border-none">
        <textarea id="userIdea" placeholder="Describe your 3D idea..." class="w-full p-4 mb-4 rounded-xl bg-gray-800 text-white border-none h-32"></textarea>
        <button onclick="submitRequest()" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:scale-105 transition">GENERATE REQUEST</button>
    </div>

    <!-- Gallery Section -->
    <h2 class="text-4xl font-black text-center mb-10 tracking-tight">PROJECT GALLERY</h2>
    <div id="galleryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto px-5 pb-20">
        <!-- Gallery items load here -->
    </div>

    <!-- Host Panel -->
    <div class="max-w-2xl mx-auto mb-20 p-8 border border-gray-200 rounded-3xl">
        <h3 class="font-bold text-lg mb-4">HOST PANEL</h3>
        <input type="text" id="imgUrl" placeholder="Paste Direct Image Link..." class="w-full p-3 mb-2 rounded-lg border">
        <input type="text" id="imgTitle" placeholder="Project Title" class="w-full p-3 mb-4 rounded-lg border">
        <button onclick="uploadProject()" class="bg-red-600 text-white px-8 py-3 rounded-lg font-bold">UPLOAD IMAGE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = { /* ... tumhari config wahi rahegi ... */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.submitRequest = async () => {
            const name = document.getElementById('userName').value;
            const idea = document.getElementById('userIdea').value;
            if(!name || !idea) return alert("Kuch toh likho!");
            await addDoc(collection(db, "projects"), { name, idea, type: 'request' });
            alert("Request submitted!");
        };

        window.uploadProject = async () => {
            const image = document.getElementById('imgUrl').value;
            const title = document.getElementById('imgTitle').value;
            await addDoc(collection(db, "projects"), { image, title, type: 'gallery' });
            alert("Added!");
        };

        // Real-time listener: data database mein save rahega, yahan bas show hoga
        onSnapshot(collection(db, "projects"), (snapshot) => {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === 'gallery') {
                    container.innerHTML += `
                        <div class="fade-in p-2 border rounded-3xl hover:shadow-2xl transition">
                            <img src="${d.image}" class="w-full h-80 object-cover rounded-2xl">
                            <h4 class="font-bold text-center py-4">${d.title}</h4>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div class="fade-in p-6 bg-gray-50 rounded-3xl">
                            <h4 class="font-bold text-lg">${d.name}</h4>
                            <p class="text-gray-600 mt-2">${d.idea}</p>
                            <span class="text-[10px] uppercase font-bold text-gray-400">Request</span>
                        </div>`;
                }
            });
        });
    </script>
</body>
</html>
