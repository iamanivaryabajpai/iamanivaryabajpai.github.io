### 1. White Theme + Professional AI Studio
Ye code copy karo aur apni `index.html` mein daal do:

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANIVARYA BAJPAI | AI STUDIO</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
</head>
<body class="bg-white text-black p-10 font-sans">

    <!-- Header -->
    <header class="py-20 text-center">
        <h1 class="text-7xl font-black tracking-tighter uppercase">Anivarya Bajpai</h1>
        <p class="text-gray-500">AI ART GENERATOR & STUDIO</p>
    </header>

    <!-- Generator Section (AI Integration) -->
    <div class="max-w-2xl mx-auto border-2 border-black p-10 rounded-3xl mb-20">
        <h2 class="text-2xl font-bold mb-4">Generate 3D AI Image</h2>
        <input type="text" id="aiPrompt" placeholder="Describe your 3D idea..." class="w-full p-4 mb-4 border-2 border-black rounded-xl">
        <button onclick="generateImage()" class="w-full bg-black text-white py-4 rounded-xl font-bold hover:bg-gray-800">GENERATE & SAVE</button>
        <div id="aiResult" class="mt-6 text-center"></div>
    </div>

    <!-- Gallery -->
    <div id="galleryContainer" class="grid grid-cols-3 gap-8 max-w-7xl mx-auto"></div>

    <!-- Host Panel (Hidden - Only for you) -->
    <div id="hostPanel" class="max-w-2xl mx-auto mt-20 p-8 bg-gray-100 rounded-3xl border-2 border-dashed border-gray-400">
        <h3 class="font-bold mb-4 text-red-600">HOST PANEL (Add Manual URL)</h3>
        <input type="text" id="imgUrl" placeholder="Direct Image URL" class="w-full p-3 mb-2 border rounded-lg">
        <input type="text" id="imgTitle" placeholder="Project Title" class="w-full p-3 mb-4 border rounded-lg">
        <button onclick="uploadProject()" class="bg-red-600 text-white w-full py-3 rounded-lg font-bold">ADD TO GALLERY</button>
    </div>

    <script type="module">
        import { initializeApp } from "[https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js](https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js)";
        import { getFirestore, collection, addDoc, onSnapshot } from "[https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js](https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js)";

        const firebaseConfig = { /* ... tumhari same config ... */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        // 1. AI Generator (Simulated for speed)
        window.generateImage = async () => {
            const prompt = document.getElementById('aiPrompt').value;
            if(!prompt) return alert("Kuch likho!");
            document.getElementById('aiResult').innerHTML = "Generating 3D Art...";
            
            // Yahan hum DALL-E ya kisi AI API ka link laga sakte hain
            const aiLink = "[https://source.unsplash.com/random/800x600/?3d](https://source.unsplash.com/random/800x600/?3d)," + prompt;
            await addDoc(collection(db, "projects"), { image: aiLink, title: prompt, type: 'gallery' });
            document.getElementById('aiResult').innerHTML = "Done! Image saved to gallery.";
        };

        // 2. Host Upload
        window.uploadProject = async () => {
            const image = document.getElementById('imgUrl').value;
            const title = document.getElementById('imgTitle').value;
            await addDoc(collection(db, "projects"), { image, title, type: 'gallery' });
            alert("Uploaded!");
        };

        // 3. Display Data
        onSnapshot(collection(db, "projects"), (snapshot) => {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === 'gallery') {
                    container.innerHTML += `<div class="border-2 border-black p-2 rounded-2xl"><img src="${d.image}" class="w-full h-64 object-cover rounded-xl"><h4 class="font-bold py-2">${d.title}</h4></div>`;
                }
            });
        });
    </script>
</body>
</html>
