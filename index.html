<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivarya Bajpai | Core Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { 
            background: radial-gradient(circle at top, #ffffff 0%, #f8fafc 50%, #f1f5f9 100%); 
            min-height: 100vh; 
        }
        @keyframes textGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .lighting-name {
            background: linear-gradient(90deg, #ff2a5f, #ff7e40, #ffca28, #ff2a5f);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 6s linear infinite;
        }
        @keyframes heartPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .heart-active {
            animation: heartPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="font-sans text-slate-900 antialiased bg-slate-50">

    <!-- INSTA-PREMIUM STICKY NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-100 px-4 py-4">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <span class="font-black text-xl tracking-tighter bg-gradient-to-r from-slate-900 via-slate-800 to-slate-700 bg-clip-text text-transparent">ANIVARYA CORE</span>
            <button onclick="openModal()" class="bg-slate-900 text-white font-bold text-xs uppercase tracking-widest px-5 py-2.5 rounded-full hover:bg-slate-800 transition-all active:scale-95 shadow-sm shadow-slate-900/10">
                + Create Post
            </button>
        </div>
    </nav>

    <!-- HEADER PROFILE PRESET -->
    <header class="max-w-xl mx-auto pt-8 px-4">
        <div class="bg-gradient-to-r from-amber-500/5 via-pink-500/5 to-red-500/5 border border-pink-500/10 text-slate-700 text-xs md:text-sm font-medium p-4 rounded-2xl mb-8 text-center shadow-sm">
            😉 Are you a stadium? Because my heart beats only when you're crowded with smiles! ✨
        </div>

        <div class="flex items-center gap-6 mb-6">
            <div class="relative w-24 h-24 shrink-0">
                <div class="absolute inset-0 bg-slate-200 rounded-full p-[3px] shadow-sm">
                    <div class="w-full h-full bg-slate-100 rounded-full flex items-center justify-center overflow-hidden">
                        <svg class="w-12 h-12 text-slate-400" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tight uppercase leading-none lighting-name">
                    Anivarya Bajpai
                </h1>
                <div class="flex gap-4 text-xs font-bold text-slate-400 pt-1">
                    <div><span class="text-slate-800 font-extrabold" id="header-post-count">0</span> updates</div>
                    <div class="text-red-500 bg-red-50 px-2 py-0.5 rounded-full text-[10px] tracking-wide uppercase font-black border border-red-100">RCB Fan For Life ❤️</div>
                </div>
            </div>
        </div>

        <div class="glass-card border border-slate-200/50 rounded-2xl p-5 shadow-sm text-sm">
            <div class="text-slate-600 space-y-1.5 font-medium">
                <p class="flex items-center gap-2"><span class="text-base">🎂</span> 14 years old • Living life my way.</p>
                <p class="flex items-center gap-2"><span class="text-base">🏏</span> Cricket is my rhythm, Virat Kohli is the vibe.</p>
            </div>
        </div>
    </header>

    <div class="max-w-xl mx-auto px-4 my-8">
        <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
    </div>

    <!-- MAIN GRID FEED POSTS TIMELINE -->
    <main class="max-w-xl mx-auto px-4 pb-24">
        <div id="feed-container" class="space-y-6"></div>
    </main>

    <!-- INTERACTION COMPONENT -->
    <div id="post-modal" class="hidden fixed inset-0 z-50 bg-slate-950/40 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md border border-slate-100 shadow-2xl overflow-hidden transition-all duration-300">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="font-extrabold text-slate-800 text-xs tracking-wider uppercase">New Update Instance</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 font-bold text-xs uppercase tracking-wider">Close</button>
            </div>
            
            <form id="post-form" class="p-6 space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5">Caption Details</label>
                    <textarea id="post-caption" required rows="3" placeholder="What's happening? Add your status update..." 
                              class="w-full rounded-2xl border border-slate-200/80 p-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-950/10 focus:border-slate-400 resize-none font-medium text-slate-800 bg-slate-50/30"></textarea>
                </div>
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5">Attach Image Asset</label>
                    <div class="border-2 border-dashed border-slate-200 hover:border-slate-400 rounded-2xl p-5 text-center cursor-pointer hover:bg-slate-50/80 transition relative group">
                        <input type="file" id="post-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <p class="text-xs font-bold text-slate-500 group-hover:text-slate-800 transition">📸 Click to Choose Image File</p>
                        <p id="file-chosen-name" class="text-xs font-semibold text-pink-600 truncate mt-1.5"></p>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white font-extrabold text-xs uppercase tracking-widest py-4 rounded-2xl hover:bg-slate-800 transition active:scale-[0.99] shadow-md shadow-slate-900/10">
                    Publish to Feed
                </button>
            </form>
        </div>
    </div>

    <!-- CORE REAL-TIME CONTROLLER MECHANICS -->
    <script>
        // ⚠️ APNA REAL CONFIG YAHAN PASTE KARO ⚠️
        // Jo block Firebase Console se mila hai, use is 'const firebaseConfig' ki jagah replace kar do
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let posts = [];

        window.addEventListener('DOMContentLoaded', () => {
            // Live Database Listener
            database.ref('posts').on('value', (snapshot) => {
                const data = snapshot.val();
                posts = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        posts.push({ id: key, ...data[key] });
                    });
                    posts.reverse(); 
                }
                renderFeed();
            });
            
            document.getElementById('post-image').addEventListener('change', function() {
                if(this.files && this.files[0]) {
                    document.getElementById('file-chosen-name').innerText = `Selected: ${this.files[0].name}`;
                }
            });

            document.getElementById('post-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const caption = document.getElementById('post-caption').value.trim();
                const fileInput = document.getElementById('post-image');
                const file = fileInput.files[0];

                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            if (width > 500) { height *= 500 / width; width = 500; }
                            canvas.width = width;
                            canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            saveNewPost(caption, canvas.toDataURL('image/jpeg', 0.5));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    saveNewPost(caption, null);
                }
            });
        });

        function openModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closeModal() {
            document.getElementById('post-modal').classList.add('hidden');
            document.getElementById('post-form').reset();
            document.getElementById('file-chosen-name').innerText = '';
        }

        function saveNewPost(caption, imgData) {
            const newPostRef = database.ref('posts').push();
            newPostRef.set({
                timestamp: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                caption: caption,
                image: imgData,
                likes: 0
            }).then(() => {
                closeModal();
            }).catch(err => alert("Error uploading: " + err.message));
        }

        function toggleLike(postId, currentLikes) {
            const likedKey = 'liked_' + postId;
            const hasLiked = localStorage.getItem(likedKey);

            let newLikes = currentLikes || 0;
            if (!hasLiked) {
                newLikes += 1;
                localStorage.setItem(likedKey, 'true');
            } else {
                newLikes = Math.max(0, newLikes - 1);
                localStorage.removeItem(likedKey);
            }

            database.ref('posts/' + postId).update({ likes: newLikes });
        }

        function deletePost(postId) {
            if(confirm("Permanently delete this update post from all devices?")) {
                database.ref('posts/' + postId).remove();
            }
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            document.getElementById('header-post-count').innerText = posts.length;
            container.innerHTML = '';

            if(posts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white border border-slate-200/60 rounded-3xl text-slate-400 font-bold text-xs uppercase tracking-widest">
                        Timeline Empty.
                    </div>`;
                return;
            }

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200/70 rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300';
                
                let mediaHtml = post.image ? `<div class="bg-slate-50 border-b border-slate-100 overflow-hidden"><img src="${post.image}" class="w-full h-auto max-h-[480px] object-cover mx-auto select-none"></div>` : '';
                
                const hasLiked = localStorage.getItem('liked_' + post.id);
                const heartClass = hasLiked ? 'text-red-500 fill-red-500 heart-active' : 'text-slate-400 fill-none';

                card.innerHTML = `
                    <div class="px-5 py-4 flex items-center justify-between border-b border-slate-50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 overflow-hidden">
                                <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
                                </svg>
                            </div>
                            <div>
                                <h4 class="text-xs font-black text-slate-800 tracking-tight">anivaryabajpai</h4>
                                <span class="text-[9px] font-semibold text-slate-400 block">${post.timestamp}</span>
                            </div>
                        </div>
                        <button onclick="deletePost('${post.id}')" class="text-xs font-bold text-slate-300 hover:text-red-500 transition px-2 py-1">Delete</button>
                    </div>
                    
                    ${mediaHtml}
                    
                    <div class="p-5 text-sm font-medium text-slate-700 text-left leading-relaxed">
                        <span class="font-black text-xs text-slate-900 mr-2 uppercase tracking-tight">anivaryabajpai</span>${post.caption}
                    </div>
                    
                    <div class="px-5 py-3.5 border-t border-slate-50 bg-slate-50/50 flex items-center">
                        <button onclick="toggleLike('${post.id}', ${post.likes || 0})" class="flex items-center gap-2 text-xs font-bold transition text-slate-600 hover:text-slate-900 group">
                            <svg class="w-4 h-4 transition-transform duration-200 group-active:scale-125 ${heartClass}" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                            </svg>
                            <span class="select-none">Likes (${post.likes || 0})</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
