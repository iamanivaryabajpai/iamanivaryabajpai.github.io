<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CORE SYSTEM MATRIX v1.0</title>
    
    <!-- Fonts & Tailwind CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #fdfdfd;
            color: #09090b;
        }
        .premium-blur {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .cool-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="font-sans antialiased pb-28">

    <!-- TOP HEADER BAR -->
    <header class="sticky top-0 z-50 premium-blur border-b border-zinc-100 px-6 py-4">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="h-2.5 w-2.5 rounded-full bg-black shadow-lg"></span>
                <h1 class="text-xl font-black tracking-tighter font-mono">ANIVARYA_CORE //</h1>
            </div>
            <div class="bg-zinc-100 text-zinc-900 text-[10px] font-mono font-bold px-3 py-1 rounded-md tracking-wider uppercase">
                ⚙️ DATABASE SYNC ACTIVE
            </div>
        </div>
    </header>

    <!-- MAIN INTERFACE VIEWPORT -->
    <main class="max-w-xl mx-auto px-4 mt-8 space-y-6">

        <!-- DYNAMIC INPUT INJECTION BOX (PEHLE VALA ACCENT SYSTEM) -->
        <div class="bg-white border border-zinc-100 rounded-[32px] p-5 cool-shadow space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-widest">// Broadcast Core Feed Node</span>
            </div>
            
            <div class="space-y-3">
                <textarea id="main-caption" rows="2" placeholder="Kuch naya aur khatarnak upload karo..." class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl p-4 text-sm font-medium outline-none focus:border-black focus:bg-white transition-all resize-none"></textarea>
                
                <!-- MODERN LIVE IMAGE CAPTURE INTERFACE -->
                <div class="flex gap-2 items-center">
                    <label class="flex-1 bg-zinc-50 border border-dashed border-zinc-200 hover:border-black rounded-xl p-3 text-center cursor-pointer transition-all">
                        <input type="file" id="main-image-file" accept="image/*" class="hidden">
                        <span id="file-label-display" class="text-xs font-semibold text-zinc-400">📸 Attach Visual Asset</span>
                    </label>
                    
                    <button onclick="compileAndPublishNode()" class="bg-black hover:bg-zinc-900 text-white font-bold text-xs px-6 py-4 rounded-xl transition-all shadow-md">
                        Inject Frame ⚡
                    </button>
                </div>
            </div>
        </div>

        <!-- STREAMS PIPELINE FEED -->
        <div id="dynamic-pipeline-feed" class="space-y-6">
            <!-- Posts render machine will insert layouts here -->
        </div>

    </main>

    <!-- SYSTEMS FUNCTIONAL CODE CONTROLLER -->
    <script>
        // Memory Block Configuration Schema Object
        let applicationDatabaseStateMap = {
            posts: [
                {
                    id: 1001,
                    author: "Anivarya",
                    caption: "Pehla wala layout, features ke sath ready hai. Isme image upload bhi kaam karega aur data save mode bhi chalega refresh karne par.",
                    image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80",
                    likesCount: 5
                }
            ]
        };

        // Initialize Core System Storage
        document.addEventListener("DOMContentLoaded", () => {
            const rawStoredPayload = localStorage.getItem("anivarya_core_storage_v1");
            if (rawStoredPayload) {
                applicationDatabaseStateMap = JSON.parse(rawStoredPayload);
            } else {
                writeStateToHardwareMemory();
            }

            // Realtime file path input text state changer hook
            document.getElementById("main-image-file").addEventListener("change", function() {
                if (this.files && this.files[0]) {
                    document.getElementById("file-label-display").innerText = `✅ Loaded: ${this.files[0].name.substring(0, 18)}...`;
                    document.getElementById("file-label-display").className = "text-xs font-bold text-black";
                }
            });

            executeFeedPipelineRender();
        });

        // Write State into Browser Memory Layer
        function writeStateToHardwareMemory() {
            localStorage.setItem("anivarya_core_storage_v1", JSON.stringify(applicationDatabaseStateMap));
        }

        // Render Machine UI Flow Loop
        function executeFeedPipelineRender() {
            const containerRef = document.getElementById("dynamic-pipeline-feed");
            containerRef.innerHTML = "";

            if (applicationDatabaseStateMap.posts.length === 0) {
                containerRef.innerHTML = `
                    <div class="border border-dashed border-zinc-200 rounded-[28px] py-12 text-center text-zinc-400 text-xs font-mono uppercase tracking-widest">
                        Awaiting new computational pipeline logs stream...
                    </div>
                `;
                return;
            }

            applicationDatabaseStateMap.posts.forEach((postNode, nodeIndex) => {
                const articleShell = document.createElement("article");
                articleShell.className = "bg-white border border-zinc-100 rounded-[32px] overflow-hidden cool-shadow transition-transform duration-300";

                let imageSegmentMarkup = postNode.image 
                    ? `<div class="bg-zinc-50 border-b border-zinc-50 overflow-hidden"><img src="${postNode.image}" class="w-full h-auto max-h-96 object-cover"></div>` 
                    : '';

                articleShell.innerHTML = `
                    <!-- Post Header Slot Component -->
                    <div class="px-5 py-4 flex items-center justify-between border-b border-zinc-50">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl bg-black text-white font-mono font-bold text-xs flex items-center justify-center uppercase">
                                ${postNode.author[0]}
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-zinc-900 font-mono">@${postNode.author.toUpperCase()}</h4>
                                <span class="text-[9px] font-mono text-zinc-400 block tracking-tight">Verified System Ledger</span>
                            </div>
                        </div>
                        <button onclick="purgeNodeByIndex(${nodeIndex})" class="text-zinc-300 hover:text-red-500 text-xs font-semibold px-2 py-1 transition-all">✕ Delete</button>
                    </div>

                    <!-- Post Core Media Graphic Content Layer -->
                    ${imageSegmentMarkup}

                    <!-- Post Typography Paragraph Segment Text Block -->
                    <div class="p-6 text-sm font-medium text-zinc-800 leading-relaxed text-left">
                        ${postNode.caption}
                    </div>

                    <!-- Post Actions Operations Interface Toolbar Control Node Footer -->
                    <div class="px-5 py-3.5 bg-zinc-50/40 flex items-center justify-between border-t border-zinc-100/50">
                        <button onclick="incrementNodeLikesCounter(${nodeIndex})" class="flex items-center gap-1.5 text-xs font-bold text-zinc-400 hover:text-black transition-all">
                            <span>⚡</span>
                            <span class="font-mono text-black">Core Flux (${postNode.likesCount || 0})</span>
                        </button>
                        <span class="text-[9px] font-mono font-bold text-zinc-400 tracking-wider">HARDWARE REGISTERS SAFE</span>
                    </div>
                `;
                containerRef.appendChild(articleShell);
            });
        }

        // Action Trigger logic router processor interface controllers
        function compileAndPublishNode() {
            const textRef = document.getElementById("main-caption");
            const fileRef = document.getElementById("main-image-file");

            const capString = textRef.value.trim();
            if (!capString) {
                alert("Bhai, pehle text caption fill up karo data packets log me!");
                return;
            }

            const activeBinaryFile = fileRef.files[0];

            if (activeBinaryFile) {
                const asyncReaderEngine = new FileReader();
                asyncReaderEngine.onload = function(evt) {
                    commitNewPostPayloadObject(capString, evt.target.result);
                };
                asyncReaderEngine.readAsDataURL(activeBinaryFile);
            } else {
                commitNewPostPayloadObject(capString, null);
            }
        }

        function commitNewPostPayloadObject(captionText, assetDataUriString) {
            const constructedObjectNode = {
                id: Date.now(),
                author: "Anivarya",
                caption: captionText,
                image: assetDataUriString,
                likesCount: 0
            };

            applicationDatabaseStateMap.posts.unshift(constructedObjectNode);
            writeStateToHardwareMemory();
            executeFeedPipelineRender();

            // Clear configuration controllers loops fields parameters layout variables
            document.getElementById("main-caption").value = "";
            document.getElementById("main-image-file").value = "";
            document.getElementById("file-label-display").innerText = "📸 Attach Visual Asset";
            document.getElementById("file-label-display").className = "text-xs font-semibold text-zinc-400";
        }

        function incrementNodeLikesCounter(index) {
            applicationDatabaseStateMap.posts[index].likesCount = (applicationDatabaseStateMap.posts[index].likesCount || 0) + 1;
            writeStateToHardwareMemory();
            executeFeedPipelineRender();
        }

        function purgeNodeByIndex(index) {
            if (confirm("System core warning: Are you sure you want to purge this post node from active browser cache variables map logs permanently?")) {
                applicationDatabaseStateMap.posts.splice(index, 1);
                writeStateToHardwareMemory();
                executeFeedPipelineRender();
            }
        }
    </script>
</body>
</html>
