<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANIVARYA BAJPAI | AI STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 font-sans">
    <header class="text-center py-10">
        <h1 class="text-5xl font-black uppercase">Anivarya Bajpai</h1>
    </header>

    <!-- Generator -->
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg mb-10">
        <input type="text" id="aiPrompt" placeholder="Describe 3D art..." class="w-full p-3 border rounded-lg mb-3">
        <button id="genBtn" class="w-full bg-black text-white py-3 rounded-lg font-bold">GENERATE & SAVE</button>
    </div>

    <!-- Gallery -->
    <div id="galleryContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0cnfHQugICJ6GpYCmYDvjjxbf001fks8",
            authDomain: "weee-35c80.firebaseapp.com",
            projectId: "weee-35c80",
            storageBucket: "weee-35c80.firebasestorage.app",
            messagingSenderId: "835643616336",
            appId: "1:835643616336:web:a974eee55dd87ch4cb555"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('genBtn').onclick = async () => {
            const prompt = document.getElementById('aiPrompt').value;
            if(!prompt) return;
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=500&height=500&seed=1`;
            await addDoc(collection(db, "projects"), { image: imgUrl, title: prompt, type: 'gallery', timestamp: Date.now() });
            alert("Image added!");
        };

        onSnapshot(query(collection(db, "projects"), orderBy("timestamp", "desc")), (snapshot) => {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                container.innerHTML += `<div class="bg-white p-2 rounded-xl shadow"><img src="${d.image}" class="w-full h-60 object-cover rounded-lg"><p class="text-center py-2 font-bold">${d.title}</p></div>`;
            });
        });
    </script>
</body>
</html>
