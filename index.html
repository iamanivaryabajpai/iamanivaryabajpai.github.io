<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIVARYA CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8">

    <!-- Header -->
    <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-16 uppercase">
        ANIVARYA <span class="text-red-600">CORE</span>
    </h1>

    <!-- Dashboard Grid -->
    <div class="grid md:grid-cols-3 gap-6 w-full max-w-5xl">
        
        <div class="glass-card p-8 rounded-3xl hover:bg-white/5 transition-all">
            <h2 class="text-sm font-bold tracking-widest text-gray-500 mb-2">IDENTITY</h2>
            <p>Premium digital presence designed for impact.</p>
        </div>

        <div class="glass-card p-8 rounded-3xl hover:border-green-500 transition-all">
            <h2 class="text-sm font-bold tracking-widest text-green-500 mb-2">>_ SYSTEM</h2>
            <p id="live-time" class="font-mono text-gray-300">Loading sync...</p>
        </div>

        <div class="glass-card p-8 rounded-3xl hover:bg-white/5 transition-all">
            <h2 class="text-sm font-bold tracking-widest text-gray-500 mb-2">STATUS</h2>
            <p>Architecting the future. Online.</p>
        </div>
    </div>

    <!-- Engagement Layer -->
    <section class="mt-12 w-full max-w-5xl">
        <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-6">Connect</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="mailto:your-email@example.com" class="glass-card p-4 rounded-xl text-center hover:text-red-500 transition">Email</a>
            <a href="https://github.com/iamanivaryabajpai" class="glass-card p-4 rounded-xl text-center hover:text-white transition">GitHub</a>
            <a href="#" class="glass-card p-4 rounded-xl text-center hover:text-blue-400 transition">Twitter</a>
            <a href="#" class="glass-card p-4 rounded-xl text-center hover:text-green-400 transition">WhatsApp</a>
        </div>
    </section>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('live-time').innerText = "TIME: " + now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
