<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivar ya's Free Gaming Zone</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #1f2833;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p { color: #66fcf1; font-size: 1.2rem; margin-bottom: 40px; }
        
        .games-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-box {
            background-color: #1f2833;
            border: 3px solid #45f3ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
            transition: 0.3s;
        }
        .game-box:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.5);
            border-color: #ff007f;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffffff;
        }

        /* Responsive Iframe for Games */
        iframe {
            border: none;
            border-radius: 10px;
            background: #000;
        }
    </style>
</head>
<body>

    <h1>🎮 ANIVAR YA'S GAMING ZONE 🎮</h1>
    <p>Play Free Online HTML5 Games - No Download Required!</p>

    <div class="games-container">

        <!-- Game 1: Cyber Cars Punk Racing -->
        <div class="game-box">
            <div class="game-title">🏎️ Cyber Cars Racing</div>
            <iframe src="https://html5.gamedistribution.com/6090cfca99654e53b6cb43e3ef749007/?gd_sdk_referrer_url=https%3A%2F%2Fgamedistribution.com%2Fgames%2Fcyber-cars-punk-racing" width="400" height="300" scrolling="none" frameborder="0"></iframe>
        </div>

        <!-- Game 2: Merge To Million (Puzzle/Strategy) -->
        <div class="game-box">
            <div class="game-title">🧩 Merge To Million</div>
            <iframe src="https://html5.gamedistribution.com/b0be8debc0004fecb87fa130f146be06/?gd_sdk_referrer_url=https%3A%2F%2Fgamedistribution.com%2Fgames%2Fmerge-to-million" width="400" height="300" scrolling="none" frameborder="0"></iframe>
        </div>

    </div>

</body>
</html>
