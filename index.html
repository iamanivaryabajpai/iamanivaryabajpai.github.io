<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google SEO Title -->
    <title>Anivarya Bajpai</title>
    <meta name="description" content="Anivarya Bajpai - Official Website">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/matter-js@0.19.0/build/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: white; font-family: sans-serif; }
    </style>
</head>
<body>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        const render = Render.create({ 
            element: document.body, 
            engine: engine, 
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'white' }
        });
        
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
        Composite.add(engine.world, [ground]);

        // Name creation: ANIVARYA BAJPAI
        const text = "ANIVARYABAJPAI";
        text.split('').forEach((char, i) => {
            const body = Bodies.rectangle(window.innerWidth/2 + (i*80) - 500, 100, 70, 100, { 
                render: { fillStyle: 'black' }, restitution: 0.8 
            });
            Composite.add(engine.world, [body]);
        });

        const mouse = Mouse.create(render.canvas);
        Composite.add(engine.world, MouseConstraint.create(engine, { mouse: mouse }));

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // Click to make them fall/scatter
        window.addEventListener('click', () => {
            engine.world.bodies.forEach(b => {
                if(!b.isStatic) Matter.Body.applyForce(b, b.position, {x: (Math.random()-0.5)*0.5, y: -0.5});
            });
        });
    </script>
</body>
</html>
