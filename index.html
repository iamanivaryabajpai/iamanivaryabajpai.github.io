<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIVARYA RASOI - Smart Cooking OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #ff4f2b;
            --brand-gradient: linear-gradient(135deg, #ff4f2b 0%, #ff7849 100%);
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Luxury Global Branding Header */
        .brand-header {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03);
        }

        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand-header p {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Card System */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        }

        .app-card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search Input */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .main-input {
            width: 100%;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            color: var(--text-dark);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
        }

        .main-input:focus {
            border-color: var(--brand);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 79, 43, 0.1);
        }

        /* Modern Meal Type Segment Tracker */
        .meal-segmentor {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 15px;
        }

        .segment-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-gray);
            padding: 10px 6px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .segment-btn.active {
            background: #ffffff;
            color: var(--brand);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Flex Header with Inline Next Logic Button */
        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .next-btn {
            background: #fff3f0;
            border: 1px solid rgba(255, 79, 43, 0.2);
            color: var(--brand);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .next-btn:hover {
            background: var(--brand);
            color: white;
        }

        /* Live Recipe Canvas */
        .recipe-box-output {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            animation: cardPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recipe-title {
            color: var(--brand);
            font-weight: 800;
            font-size: 1.15rem;
            margin-bottom: 6px;
        }

        .recipe-desc {
            font-size: 0.9rem;
            color: #334155;
            line-height: 1.6;
        }

        /* Dynamic Custom Ration List Creator */
        .ration-input-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .ration-text-field {
            flex: 1;
            background: #f1f5f9;
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
        }

        .ration-add-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .dynamic-list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .list-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
        }

        .list-item-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .delete-item-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-button {
            width: 100%;
            background: var(--brand-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 79, 43, 0.2);
            transition: transform 0.2s;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.98) translateY(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-gray);
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- CORE HIGH END BRAND HEADER -->
        <div class="brand-header">
            <h1>ANIVARYA RASOI</h1>
            <p>The Global Smart Kitchen Hub</p>
        </div>

        <!-- SEARCH FILTERS & CATEGORIES -->
        <div class="app-card">
            <h2>🔍 आपके पास अभी क्या सामान उपलब्ध है?</h2>
            
            <!-- Custom Meal Phase Triggers -->
            <div class="meal-segmentor">
                <button class="segment-btn active" id="meal-all" onclick="updateMealSegment('all')">All Food</button>
                <button class="segment-btn" id="meal-breakfast" onclick="updateMealSegment('breakfast')">Breakfast</button>
                <button class="segment-btn" id="meal-lunch" onclick="updateMealSegment('lunch')">Lunch</button>
                <button class="segment-btn" id="meal-dinner" onclick="updateMealSegment('dinner')">Dinner</button>
            </div>

            <div class="input-group">
                <input type="text" id="recipe-search-box" class="main-input" oninput="runRecipeEngine()" placeholder="सामान का नाम लिखें (जैसे: chawal, paneer, gobhi, aloo)...">
            </div>
        </div>

        <!-- STYLISH OUTPUT GENERATOR CANVAS -->
        <div class="app-card">
            <div class="recipe-header">
                <h2>🍳 Recommended Recipes</h2>
                <button class="next-btn" onclick="rotateRecipeSelection()">🔄 Next Option</button>
            </div>
            <div id="engine-canvas-route">
                <div style="text-align: center; color: var(--text-gray); font-size: 0.85rem; padding: 20px;">
                    Type something above to instantly fetch tailored recipes.
                </div>
            </div>
        </div>

        <!-- CUSTOM DYNAMIC RATION SHEET BOARD -->
        <div class="app-card">
            <h2>📝 Missing Ration List (खत्म सामान)</h2>
            <div class="ration-input-bar">
                <input type="text" id="new-ration-item" class="ration-text-field" placeholder="Add missing item...">
                <button class="ration-add-btn" onclick="addNewRationNode()">+</button>
            </div>
            <div class="dynamic-list-container" id="ration-list-canvas">
                <!-- Items inject here dynamically -->
            </div>
            <button class="action-button" onclick="copyRationListToClipboard()">📋 COPY RATION LIST</button>
        </div>

        <footer>© 2026 ANIVARYA RASOI // WORLD SCALE EDITION</footer>
    </div>

    <script>
        let currentRecipeIndex = 0;
        let globalActiveSegment = 'all';
        let customRationItemsArray = ["Milk (दूध)", "Sugar (चीनी)"];
        let matchedRecipesList = [];

        // Huge Infinite Resilient Database Array
        const recipeDatabasePool = [
            { name: "Crispy Jeera Aloo", tags: ["aloo", "potato", "आलू"], phase: "breakfast", desc: "कढ़ाई में थोड़ा तेल गरम करके जीरा, हरी मिर्च चटकाएं। उबले हुए आलू के टुकड़े, हल्दी, स्वादानुसार नमक डालें और 5 मिनट तक क्रिस्पी होने तक भूनें।" },
            { name: "Dhaba Style Dum Aloo", tags: ["aloo", "potato", "आलू"], phase: "lunch", desc: "छोटे आलुओं को छीलकर फ्राई कर लें। फिर टमाटर, प्याज, अदरक और खड़े मसालों की गाढ़ी तरी बनाकर आलुओं को धीमी आंच पर दम दें।" },
            { name: "Classic Paneer Bhurji", tags: ["paneer", "पनीर"], phase: "breakfast", desc: "बारीक कटे प्याज और टमाटर को कढ़ाई में भूनें। हल्दी, गरम मसाला और कसूरी मेथी डालने के बाद क्रश किया हुआ ताज़ा पनीर मिलाकर 3 मिनट चलाएं।" },
            { name: "Shahi Matar Paneer", tags: ["paneer", "matar", "पनीर", "मटर"], phase: "dinner", desc: "प्याज, टमाटर, काजू का पेस्ट भूनें। उसमें मटर और पनीर क्यूब्स डालकर स्वादानुसार नमक-मिर्च डालें और गाढ़ी मखमली तरी तैयार करें।" },
            { name: "Masala Fried Rice", tags: ["chawal", "rice", "चावल"], phase: "lunch", desc: "पके हुए चावल को थोड़े से तेल, बारीक कटे प्याज, जीरा, राई और मैगी मसाला या शेजवान सॉस के साथ तेज आंच पर 2 मिनट के लिए फ्राई करें।" },
            { name: "Savoury Besan Chilla", tags: ["besan", "बेसन"], phase: "breakfast", desc: "बेसन में पानी, बारीक कटा प्याज, हरी मिर्च, धनिया पत्ती, नमक और थोड़ी सी अजवाइन डालकर पतला घोल बनाएं। नॉन-स्टिक तवे पर चीला सेकें।" },
            { name: "Traditional Matar Nimona", tags: ["matar", "peas", "मटर"], phase: "lunch", desc: "ताजी हरी मटर को दरदरा पीसकर तेल में खूब अच्छी तरह भून लें। फिर तले हुए आलू और पानी डालकर बढ़िया ऑथेंटिक यूपी स्टाइल तरी पकाएं।" },
            { name: "Aloo Gobhi Dry Masala", tags: ["gobhi", "aloo", "गोभी"], phase: "dinner", desc: "तेल में जीरा, हींग, अदरक का तड़का दें। गोभी के फूल और आलू के स्लाइस को हल्दी, नमक, धनिया पाउडर के साथ ढककर भाप में पकाएं।" },
            { name: "Instant Dahi Tadka", tags: ["dahi", "curd", "दही"], phase: "lunch", desc: "गाढ़े दही को फेंट लें। पैन में थोड़ा सा घी, राई, कढ़ी पत्ता, बारीक कटा प्याज और सूखी लाल मिर्च का तड़का तैयार करके दही में मिला दें।" },
            { name: "Spiced Bread Upma", tags: ["bread", "ब्रेड"], phase: "breakfast", desc: "ब्रेड के छोटे टुकड़े करें। कड़ाही में राई, कढ़ी पत्ता, प्याज और मूंगफली भूनें, फिर ब्रेड डालकर पानी का हल्का छींटा मारें और मिक्स करें।" },
            { name: "Maggi Masala Special", tags: ["maggi", "noodles", "मैगी"], phase: "breakfast", desc: "पानी उबालकर मैगी नूडल्स, टेस्टमेकर और अपनी पसंदीदा सब्जियां डालें। एक्स्ट्रा स्वाद के लिए अंत में थोड़ा बटर और धनिया डालें।" },
            { name: "Khichdi Sovereign", tags: ["rice", "dal", "चावल", "दाल"], phase: "dinner", desc: "चावल और मूंग दाल को धोकर कुकर में डालें। हल्दी, नमक, घी और पानी डालकर 3 सीटी लगाएं। ऊपर से हींग-जीरे का तड़का दें।" }
        ];

        // Boot Ration View Renderer
        function renderRationNodes() {
            const listCanvas = document.getElementById('ration-list-canvas');
            listCanvas.innerHTML = '';
            customRationItemsArray.forEach((node, index) => {
                listCanvas.innerHTML += `
                    <div class="list-item-row">
                        <span class="list-item-text">🛒 ${node}</span>
                        <button class="delete-item-btn" onclick="removeRationNode(${index})">✕</button>
                    </div>
                `;
            });
        }

        function addNewRationNode() {
            const field = document.getElementById('new-ration-item');
            const data = field.value.trim();
            if(data !== '') {
                customRationItemsArray.push(data);
                field.value = '';
                renderRationNodes();
            }
        }

        function removeRationNode(targetIndex) {
            customRationItemsArray.splice(targetIndex, 1);
            renderRationNodes();
        }

        function updateMealSegment(targetPhase) {
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`meal-${targetPhase}`).classList.add('active');
            globalActiveSegment = targetPhase;
            currentRecipeIndex = 0;
            runRecipeEngine();
        }

        // Master Fail-Safe Recipe Search Processing Core
        function runRecipeEngine() {
            const searchKeyword = document.getElementById('recipe-search-box').value.toLowerCase().trim();
            const canvas = document.getElementById('engine-canvas-route');

            if(searchKeyword === '') {
                matchedRecipesList = [];
                canvas.innerHTML = `<div style="text-align: center; color: var(--text-gray); font-size: 0.85rem; padding: 20px;">Type something above to instantly fetch tailored recipes.</div>`;
                return;
            }

            // Phase 1: Try strict match from local pool database
            matchedRecipesList = recipeDatabasePool.filter(node => {
                const keywordMatch = node.tags.some(t => searchKeyword.includes(t)) || node.name.toLowerCase().includes(searchKeyword);
                const phaseMatch = (globalActiveSegment === 'all') || (node.phase === globalActiveSegment);
                return keywordMatch && phaseMatch;
            });

            // Phase 2: Global Fallback Auto-Generation Engine if no exact keyword match
            if(matchedRecipesList.length === 0) {
                // Capitalize input string for premium presentation
                let cleanTitle = searchKeyword.charAt(0).toUpperCase() + searchKeyword.slice(1);
                matchedRecipesList = [{
                    name: `Special Homemade ${cleanTitle} Plate`,
                    desc: `कढ़ाई या पैन में थोड़ा सा कुकिंग ऑयल या घी गरम करें। अपनी पसंद के अनुसार जीरा, कटी हुई हरी मिर्च और बारीक कटे प्याज को सुनहरा होने तक भूनें। अब इसमें ${cleanTitle} को अच्छी तरह धोकर या काटकर डालें। हल्दी, गरम मसाला, नमक और स्वादानुसार लाल मिर्च छिड़कें। मध्यम आंच पर ढककर 8-12 मिनट तक पकाएं और अंत में ताजे कटे धनिए से सजाकर सर्व करें!`
                }];
            }

            renderActiveNodeCanvas();
        }

        function renderActiveNodeCanvas() {
            const canvas = document.getElementById('engine-canvas-route');
            if(matchedRecipesList.length === 0) return;

            let pointer = currentRecipeIndex % matchedRecipesList.length;
            let targetNode = matchedRecipesList[pointer];

            canvas.innerHTML = `
                <div class="recipe-box-output">
                    <div class="recipe-title">${targetNode.name}</div>
                    <div class="recipe-desc">${targetNode.desc}</div>
                </div>
                <p style="font-size:0.75rem; color:var(--text-gray); text-align:center; margin-top:8px; font-weight:500;">
                    💡 Total ${matchedRecipesList.length} options found. Click "Next Option" to rotate (${pointer + 1}/${matchedRecipesList.length})
                </p>
            `;
        }

        function rotateRecipeSelection() {
            if(matchedRecipesList.length <= 1) {
                alert("इस सर्च के लिए अभी एक ही बेस्ट रेसिपी लोड हो सकी है!");
                return;
            }
            currentRecipeIndex++;
            renderActiveNodeCanvas();
        }

        // Native Fast Copy Engine
        function copyRationListToClipboard() {
            if(customRationItemsArray.length === 0) {
                alert("List खाली है, पहले कुछ Items ऐड कर लो भाई!");
                return;
            }
            let textToCopy = `📋 ANIVARYA RASOI - Missing Ration Checklist:\n\n` + customRationItemsArray.map(item => `• ${item}`).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Ration List copied straight to clipboard! Check and paste anywhere.");
            }).catch(err => {
                alert("Error copying content automatically.");
            });
        }

        renderRationNodes();
    </script>
</body>
</html>
