<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivarya Bajpai | AI 3D Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

    <!-- Navigation -->
    <nav class="max-w-7xl mx-auto px-8 py-10 flex justify-between items-center border-b">
        <div class="text-xl font-bold tracking-tighter">ANIVARYA.BAJPAI</div>
    </nav>

    <main class="max-w-5xl mx-auto px-8 py-20">
        
        <!-- AI Generator Section (Ab ye dikhega) -->
        <section id="ai-generator" class="bg-gray-50 p-10 rounded-3xl mb-20">
            <h1 class="text-4xl font-black mb-6">AI 3D Project Generator</h1>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="Your Name" class="w-full p-4 rounded-xl border">
                <textarea id="userIdea" placeholder="Describe your 3D idea (e.g., Pixar style banana)..." class="w-full p-4 rounded-xl border h-32"></textarea>
                <button onclick="submitRequest()" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase">Generate / Submit Request</button>
            </div>
        </section>

        <!-- User Gallery Section -->
        <section id="gallery" class="mb-20">
            <h2 class="text-2xl font-bold mb-8">Generated 3D Gallery</h2>
            <div id="galleryContainer" class="grid md:grid-cols-3 gap-6">
                <!-- Data yahan database se aayega -->
                <div class="border-2 border-dashed p-10 text-center rounded-2xl text-gray-400">
                    Gallery is empty. Submit a project to start!
                </div>
            </div>
        </section>

        <!-- Host Management Panel (Only for You) -->
        <section class="border-t pt-10">
            <h3 class="text-xl font-bold mb-6 text-red-500">Host Management Panel</h3>
            <div class="bg-red-50 p-6 rounded-2xl space-y-4">
                <p>Upload new 3D assets directly to the gallery:</p>
                <input type="file" id="imageUpload" class="block w-full text-sm">
                <button onclick="uploadToGallery()" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Approve & Upload to Gallery</button>
            </div>
        </section>
    </main>

    <script>
        function submitRequest() {
            alert("Project request submitted! As the host, I will review this and add it to the gallery.");
        }
        function uploadToGallery() {
            alert("Image uploaded successfully to the gallery!");
        }
    </script>
</body>
</html>
