<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivar ya's Personal Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* Clock Style */
        .clock-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        #greeting {
            font-size: 1.5rem;
            color: #38bdf8;
            font-weight: 300;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        #date {
            font-size: 1.1rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* Search Bar Style */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .search-card:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .search-card form {
            display: flex;
            width: 100%;
        }

        .search-card input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 20px;
            font-size: 1rem;
        }

        .search-card button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            outline: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .search-card button:hover {
            background: #0ea5e9;
        }

        /* Quote Box */
        .quote-box {
            font-style: italic;
            color: #cbd5e1;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* To-Do List Style */
        .todo-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
        }

        .todo-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #818cf8;
            letter-spacing: 1px;
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input-group input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .todo-input-group input:focus {
            border-color: #818cf8;
        }

        .todo-input-group button {
            background: #818cf8;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            background: rgba(255,255,255,0.02);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .todo-item button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: 600;
        }

        footer {
            margin-top: 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #64748b;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- CLOCK CARD -->
        <div class="clock-card">
            <div id="greeting">Loading...</div>
            <div id="clock">00:00:00</div>
            <div id="date">Loading Date...</div>
        </div>

        <!-- SEARCH BAR -->
        <div class="search-card">
            <form action="https://www.google.com/search" method="get" target="_blank">
                <input type="text" name="q" placeholder="Search Google directly from here..." required>
                <button type="submit">Search</button>
            </form>
        </div>

        <!-- MOTIVATIONAL QUOTE -->
        <div class="quote-box" id="quote">
            "The best way to predict the future is to create it."
        </div>

        <!-- TO-DO WORKSPACE -->
        <div class="todo-card">
            <h3>📌 Daily Focus Tasks</h3>
            <div class="todo-input-group">
                <input type="text" id="todo-input" placeholder="Add a new task for today...">
                <button onclick="addTodo()">Add</button>
            </div>
            <ul class="todo-list" id="todo-list">
                <!-- Tasks will appear here -->
            </ul>
        </div>

        <footer>ANIVAR YA // DIGITAL HUB 2026</footer>
    </div>

    <script>
        // Real-time Clock & Dynamic Greeting Logic
        function updateDashboard() {
            const now = new Date();
            
            // Time string
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;

            // Date string
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);

            // Greeting based on hours
            let greeting = "Welcome";
            if (hours < 12) greeting = "Good Morning, Anivar ya";
            else if (hours < 17) greeting = "Good Afternoon, Anivar ya";
            else if (hours < 21) greeting = "Good Evening, Anivar ya";
            else greeting = "Good Night, Anivar ya";
            document.getElementById('greeting').innerText = greeting;
        }
        setInterval(updateDashboard, 1000);
        updateDashboard();

        // Local Random Quotes System
        const quotes = [
            "Mehnat itni khamoshi se karo ki kamyabi shor macha de.",
            "The only limit to our realization of tomorrow is our doubts of today.",
            "Success is not final, failure is not fatal: it is the courage to continue that counts.",
            "Choti choti galtiyon se mat daro, wahi bada rasta dikhati hain.",
            "Believe you can and you're halfway there."
        ];
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quote').innerText = `"${randomQuote}"`;

        // To-Do List Core Logic (Saves in Browser Storage)
        let todos = JSON.parse(localStorage.getItem('myTodos')) || ["Explore coding setups", "Show this website to family"];

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = 'todo-item';
                li.innerHTML = `<span>${todo}</span><button onclick="deleteTodo(${index})">✕</button>`;
                list.appendChild(li);
            });
            localStorage.setItem('myTodos', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if (input.value.trim() !== '') {
                todos.push(input.value.trim());
                input.value = '';
                renderTodos();
            }
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            renderTodos();
        }

        // Allow pressing Enter key to add task
        document.getElementById('todo-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        renderTodos();
    </script>
</body>
</html>
