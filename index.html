<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anivarya Core | Premium Instagram Post Feed Engine</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { 
            background: #ffffff;
            min-height: 100vh; 
        }
        .white-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        @keyframes textGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .lighting-name {
            background: linear-gradient(90deg, #ff2a5f, #ff7e40, #ffca28, #ff2a5f);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 6s linear infinite;
        }
        .music-spinning {
            animation: spin 4s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .insta-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 20px;
            border-radius: 3px;
            background: #000000;
            cursor: pointer;
        }
    </style>

    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="font-sans text-slate-900 antialiased bg-slate-50/50">

    <!-- INSTAGRAM BLOCK USER INITIAL IDENTITY DIALOGUE -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border border-slate-100">
            <h2 class="text-xl font-black tracking-tight text-slate-900 mb-1">Instagram Identity Node</h2>
            <p class="text-xs font-semibold text-slate-400 mb-6">Create or sync your username profile to read/write feed logs.</p>
            
            <div class="space-y-3">
                <input type="text" id="username-input" placeholder="Phone, email or username handle..." 
                       class="w-full rounded-xl bg-slate-50 border border-slate-200 px-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-slate-400 font-bold transition">
                <button onclick="processAuth()" class="w-full bg-slate-900 text-white font-black text-xs uppercase tracking-widest py-3.5 rounded-xl hover:bg-black transition shadow-md">
                    Log In Securely
                </button>
            </div>
        </div>
    </div>

    <!-- CLEAN BAR APP HEADER -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60 px-4 py-3">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <span class="font-black text-xl tracking-tighter text-slate-900 italic">Instagram</span>
            <div class="flex items-center gap-3">
                <span id="nav-user-badge" class="text-[10px] font-black tracking-wide bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 uppercase">@Guest</span>
                <button onclick="openModal()" class="bg-sky-500 text-white font-bold text-xs px-4 py-2 rounded-full hover:bg-sky-600 transition shadow-sm">
                    + New Post
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN PLATFORM FEED CONTAINER -->
    <main class="max-w-xl mx-auto px-2 sm:px-4 py-6 pb-24">
        <div id="feed-container" class="space-y-6"></div>
    </main>

    <!-- COMPOSER MODAL TRAYS -->
    <div id="post-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden my-auto border border-slate-100">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h3 class="font-black text-slate-900 text-sm tracking-tight">Create New Post</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 font-bold text-xs uppercase">Cancel</button>
            </div>
            
            <form id="post-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Caption</label>
                    <textarea id="post-caption" required rows="2" placeholder="Write a caption..." 
                              class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm text-slate-800 focus:outline-none focus:border-slate-300 font-medium resize-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Add Photo/Asset</label>
                    <div class="border-2 border-dashed border-slate-200 hover:border-slate-300 rounded-xl p-4 text-center cursor-pointer transition relative bg-slate-50/50">
                        <input type="file" id="post-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <p class="text-xs font-bold text-slate-500">📸 Drag or click to upload matrix</p>
                        <p id="file-chosen-name" class="text-xs font-semibold text-rose-500 truncate mt-1"></p>
                    </div>
                    <div id="image-preview-container" class="hidden mt-3 border border-slate-100 rounded-xl overflow-hidden bg-slate-50 max-h-40 flex items-center justify-center">
                        <img id="modal-preview-img" src="" class="max-w-full max-h-40 object-contain">
                    </div>
                </div>

                <!-- INSTAGRAM MUSIC ADAPTER HARMONY MODULE -->
                <div class="bg-slate-50 p-4 border border-slate-200 rounded-2xl space-y-3">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500">🎵 Instagram Audio Selector</label>
                    <div class="flex gap-2">
                        <input type="text" id="music-search-input" placeholder="Search music catalog track..." 
                               class="w-full rounded-xl bg-white border border-slate-200 p-2 text-xs text-slate-800 focus:outline-none">
                        <button type="button" onclick="searchSongs()" class="bg-slate-900 text-white font-bold text-xs px-4 rounded-xl">Search</button>
                    </div>
                    
                    <!-- Instant Preloaded Hot Seeds Display Areas -->
                    <div id="trending-music-section">
                        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400 mb-1">🔥 Hot Trending Now</p>
                        <div id="music-results" class="space-y-1 max-h-36 overflow-y-auto bg-white border rounded-xl p-1"></div>
                    </div>

                    <!-- INSTAGRAM LYRICS TRIMMER TIMELINE BAR -->
                    <div id="lyrics-selector-box" class="hidden bg-white border border-slate-200 rounded-xl p-3 space-y-3 shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Adjust Audio Segment</span>
                            <span id="track-time-display" class="text-[9px] font-black text-white bg-slate-900 px-1.5 py-0.5 rounded">0:15</span>
                        </div>
                        
                        <!-- Premium Linear Scrubber Track Simulation Slider -->
                        <input type="range" id="lyrics-scrubber" min="0" max="4" value="1" step="1" oninput="updateLiveLyricsDisplay()"
                               class="w-full h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer insta-slider">
                        
                        <div class="p-2 bg-slate-50 border border-slate-100 rounded-lg">
                            <input type="text" id="custom-lyrics-line" class="w-full bg-transparent text-center font-bold text-xs text-slate-800 focus:outline-none" value="">
                        </div>
                    </div>
                    
                    <div id="selected-music-badge" class="hidden p-2 bg-slate-900 text-white rounded-xl flex items-center justify-between text-xs font-bold">
                        <div class="flex items-center gap-2 min-w-0">
                            <img id="selected-music-track-img" src="" class="w-6 h-6 rounded-md">
                            <span id="selected-music-text" class="truncate max-w-[180px]">Song Selected</span>
                        </div>
                        <button type="button" onclick="removeSelectedMusic()" class="text-white font-bold px-1 text-xs">✕</button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-extrabold text-xs uppercase tracking-widest py-3.5 rounded-xl transition shadow-md">
                    Share Post
                </button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBr4am8q_Gv9gScRy7OWeqn9qBoYzVe7V0",
            authDomain: "anivarya-core.firebaseapp.com",
            databaseURL: "https://anivarya-core-default-rtdb.firebaseio.com",
            projectId: "anivarya-core",
            storageBucket: "anivarya-core.firebasestorage.app",
            messagingSenderId: "372148589646",
            appId: "1:372148589646:web:30e66d4b6eeea0dfd89f1f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const MASTER_ADMIN_KEY = "ANIVARYA_OWNER_XYZ";
        let activeUser = localStorage.getItem('core_user_id') || "";
        let posts = [];
        let chosenMusicTrack = null;
        
        // Audio Global Controller States
        let globalAudioInstances = {}; 
        let activeSongLyricsBank = [];

        const prebuiltTrendingSeeds = [
            {trackName: "Pehle Bhi Main", artistName: "Vishal Mishra", artworkUrl100: "https://is1-ssl.mzstatic.com/image/thumb/Music116/v4/bf/20/0a/bf200aa0-8025-b461-8cf6-cbf65e2361dc/192641870233_Cover.jpg/100x100bb.jpg", previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview126/v4/2b/ef/c7/2befc74b-61bd-3453-294b-14c1fa6e9fb3/mzaf_10526081471746654823.plus.aac.p.m4a"},
            {trackName: "Mi Amor", artistName: "Nova & Sharn", artworkUrl100: "https://is1-ssl.mzstatic.com/image/thumb/Music112/v4/95/92/7d/95927d6d-2d4e-fbbf-0840-7e181966a3d1/artwork.jpg/100x100bb.jpg", previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/da/90/a6/da90a604-03c0-44be-629f-a89e09d17bd5/mzaf_6560467554988085273.plus.aac.p.m4a"},
            {trackName: "Softly", artistName: "Karan Aujla", artworkUrl100: "https://is1-ssl.mzstatic.com/image/thumb/Music116/v4/f0/54/98/f054986c-0fc8-c30d-2708-620ee8c9df43/192641662999_Cover.jpg/100x100bb.jpg", previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview126/v4/71/ec/91/71ec912d-96cf-ec9c-cc81-b5eb0ea57797/mzaf_16422792601951566415.plus.aac.p.m4a"},
            {trackName: "Starboy", artistName: "The Weeknd", artworkUrl100: "https://is1-ssl.mzstatic.com/image/thumb/Music125/v4/e0/75/1b/e0751b3d-cb7f-a6cb-bf17-d57b32815147/16UMGIM60456.rgb.jpg/100x100bb.jpg", previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/bf/25/67/bf25672c-be96-b0ff-90a6-562772594248/mzaf_8407425126831006509.plus.aac.p.m4a"},
            {trackName: "Elevated", artistName: "Shubh", artworkUrl100: "https://is1-ssl.mzstatic.com/image/thumb/Music112/v4/4b/f5/8a/4bf58a0a-be7d-fb49-a2a4-f5d1376df173/artwork.jpg/100x100bb.jpg", previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/cb/20/64/cb2064df-6b83-a7bb-1c4a-fe3ff38b819a/mzaf_12411516041162464731.plus.aac.p.m4a"}
        ];

        window.addEventListener('DOMContentLoaded', () => {
            evaluateUserSession();

            database.ref('posts').on('value', (snapshot) => {
                const data = snapshot.val();
                posts = [];
                if (data) {
                    Object.keys(data).forEach(key => { posts.push({ id: key, ...data[key] }); });
                    posts.reverse(); 
                }
                renderFeed();
            });
            
            document.getElementById('post-image').addEventListener('change', function() {
                if(this.files && this.files[0]) {
                    const file = this.files[0];
                    document.getElementById('file-chosen-name').innerText = `Chosen: ${file.name}`;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('modal-preview-img').src = e.target.result;
                        document.getElementById('image-preview-container').classList.remove('hidden');
                        generateMusicRecommendationOnPhoto(); 
                    }
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('post-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const caption = document.getElementById('post-caption').value.trim();
                const fileInput = document.getElementById('post-image');
                const file = fileInput.files[0];

                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            if (width > 750) { height *= 750 / width; width = 750; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            saveNewPost(caption, canvas.toDataURL('image/jpeg', 0.85));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    saveNewPost(caption, null);
                }
            });

            populateInitialTrendingMusic(prebuiltTrendingSeeds);
        });

        function evaluateUserSession() {
            if(!activeUser) {
                document.getElementById('auth-overlay').classList.remove('hidden');
            } else {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('nav-user-badge').innerText = activeUser === MASTER_ADMIN_KEY ? "⚙ Owner Master" : `@${activeUser}`;
            }
        }

        function processAuth() {
            const raw = document.getElementById('username-input').value.trim();
            if(!raw) return alert("Enter valid user handle parameters!");
            let processedHandle = raw.replace(/\s+/g, '_').toLowerCase();
            if(raw === MASTER_ADMIN_KEY || raw.toLowerCase() === 'anivaryabajpai') {
                processedHandle = MASTER_ADMIN_KEY; 
            }
            localStorage.setItem('core_user_id', processedHandle);
            activeUser = processedHandle;
            evaluateUserSession();
            renderFeed();
        }

        function populateInitialTrendingMusic(tracks) {
            const resultsDiv = document.getElementById('music-results');
            resultsDiv.innerHTML = '';
            tracks.forEach(track => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between p-2 hover:bg-slate-50 cursor-pointer rounded-lg transition';
                row.onclick = () => selectMusicTrack(track);
                row.innerHTML = `
                    <div class="flex items-center gap-2 pointer-events-none min-w-0">
                        <img src="${track.artworkUrl100}" class="w-8 h-8 rounded border">
                        <div class="text-left truncate">
                            <p class="text-xs font-bold text-slate-800 truncate max-w-[170px]">${track.trackName}</p>
                            <p class="text-[10px] text-slate-400 font-medium truncate max-w-[170px]">${track.artistName}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black text-sky-500 bg-sky-50 px-2 py-1 rounded-md">Add</span>
                `;
                resultsDiv.appendChild(row);
            });
        }

        function generateMusicRecommendationOnPhoto() {
            const shuffled = [...prebuiltTrendingSeeds].sort(() => 0.5 - Math.random());
            const recommendationList = shuffled.slice(0, 2);
            const resultsDiv = document.getElementById('music-results');
            resultsDiv.innerHTML = '<div class="p-1 text-[9px] font-black tracking-wide text-sky-500 uppercase">✨ Photo AI Match Recs:</div>';
            recommendationList.forEach(track => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between p-2 bg-sky-50/50 hover:bg-sky-50 border border-sky-100 cursor-pointer rounded-lg transition';
                row.onclick = () => selectMusicTrack(track);
                row.innerHTML = `
                    <div class="flex items-center gap-2 pointer-events-none min-w-0">
                        <img src="${track.artworkUrl100}" class="w-8 h-8 rounded-md">
                        <div class="text-left truncate">
                            <p class="text-xs font-bold text-slate-800 truncate max-w-[170px]">${track.trackName}</p>
                            <p class="text-[10px] text-slate-400 font-medium truncate max-w-[170px]">${track.artistName}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black text-white bg-sky-500 px-2 py-1 rounded-md">Apply</span>
                `;
                resultsDiv.appendChild(row);
            });
        }

        function searchSongs() {
            const query = document.getElementById('music-search-input').value.trim();
            if(!query) return populateInitialTrendingMusic(prebuiltTrendingSeeds);
            fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=5`)
                .then(res => res.json())
                .then(data => {
                    populateInitialTrendingMusic(data.results.map(t => ({
                        trackName: t.trackName, artistName: t.artistName, artworkUrl100: t.artworkUrl100, previewUrl: t.previewUrl
                    })));
                });
        }

        function selectMusicTrack(track) {
            activeSongLyricsBank = [
                `🎵 "Pehle bhi main tumse mila hoon, karwate badal kar..."`,
                `❤️ "Teri aankhon ka ye nasha, mujhe sach me lag gaya..."`,
                `✨ "Main jo jee raha hoon, wajah tum ho, bas tum ho..."`,
                `🔥 "Drop Beats: Sab dhundhla hai par tera nasha saaf hai..."`,
                `🌟 "Chorus Loop: Kyun hai fasle, paas aane do zara..."`
            ];

            chosenMusicTrack = {
                title: track.trackName, artist: track.artistName,
                audioUrl: track.previewUrl, coverUrl: track.artworkUrl100,
                lyricsText: activeSongLyricsBank[1]
            };

            document.getElementById('selected-music-track-img').src = track.artworkUrl100;
            document.getElementById('selected-music-text').innerText = track.trackName;
            
            document.getElementById('selected-music-badge').classList.remove('hidden');
            document.getElementById('lyrics-selector-box').classList.remove('hidden');
            document.getElementById('trending-music-section').classList.add('hidden');
            
            document.getElementById('lyrics-scrubber').value = 1;
            updateLiveLyricsDisplay();
        }

        function updateLiveLyricsDisplay() {
            const idx = document.getElementById('lyrics-scrubber').value;
            const timelineStamps = ["0:04", "0:15", "0:26", "0:40", "0:53"];
            document.getElementById('track-time-display').innerText = timelineStamps[idx];
            if(activeSongLyricsBank[idx]) {
                document.getElementById('custom-lyrics-line').value = activeSongLyricsBank[idx];
            }
        }

        function removeSelectedMusic() {
            chosenMusicTrack = null;
            document.getElementById('selected-music-badge').classList.add('hidden');
            document.getElementById('lyrics-selector-box').classList.add('hidden');
            document.getElementById('trending-music-section').classList.remove('hidden');
            populateInitialTrendingMusic(prebuiltTrendingSeeds);
        }

        function openModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closeModal() {
            document.getElementById('post-modal').classList.add('hidden');
            document.getElementById('post-form').reset();
            document.getElementById('file-chosen-name').innerText = '';
            document.getElementById('image-preview-container').classList.add('hidden');
            removeSelectedMusic();
        }

        function saveNewPost(caption, imgData) {
            if(chosenMusicTrack) {
                chosenMusicTrack.lyricsText = document.getElementById('custom-lyrics-line').value.trim();
            }
            const newPostRef = database.ref('posts').push();
            newPostRef.set({
                userHandle: activeUser === MASTER_ADMIN_KEY ? "anivaryabajpai" : activeUser,
                creatorOwnerTokenId: activeUser, 
                timestamp: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                caption: caption, image: imgData,
                music: chosenMusicTrack ? chosenMusicTrack : null,
                likes: 0
            }).then(() => { closeModal(); });
        }

        // CORNER REPLICA AUDIO MASTER ON/OFF TRIGGER DELEGATION ENGINE
        function triggerInstaAudioToggle(postId, audioUrl) {
            const diskEl = document.getElementById(`disk-${postId}`);
            const stateIcon = document.getElementById(`state-icon-${postId}`);
            
            // If already initialized and running, toggle it
            if (globalAudioInstances[postId]) {
                if (globalAudioInstances[postId].paused) {
                    // Turn Audio ON
                    globalAudioInstances[postId].play();
                    diskEl.classList.add('music-spinning');
                    stateIcon.innerHTML = `🔊`; // Unmuted Icon
                } else {
                    // Turn Audio OFF (Mute)
                    globalAudioInstances[postId].pause();
                    diskEl.classList.remove('music-spinning');
                    stateIcon.innerHTML = `🔇`; // Muted Icon
                }
                return;
            }

            // Halt all other active background processes beforehand
            Object.keys(globalAudioInstances).forEach(k => {
                globalAudioInstances[k].pause();
                const d = document.getElementById(`disk-${k}`);
                const s = document.getElementById(`state-icon-${k}`);
                if(d) d.classList.remove('music-spinning');
                if(s) s.innerHTML = `🔇`;
            });

            // Initialize fresh background context thread channel
            const audioObj = new Audio(audioUrl);
            audioObj.loop = true;
            globalAudioInstances[postId] = audioObj;
            
            audioObj.play();
            diskEl.classList.add('music-spinning');
            stateIcon.innerHTML = `🔊`;

            audioObj.onended = () => {
                diskEl.classList.remove('music-spinning');
                stateIcon.innerHTML = `🔇`;
            };
        }

        function toggleLike(postId, currentLikes) {
            const likedKey = 'liked_' + postId;
            const hasLiked = localStorage.getItem(likedKey);
            let newLikes = currentLikes || 0;
            if (!hasLiked) { newLikes += 1; localStorage.setItem(likedKey, 'true'); } 
            else { newLikes = Math.max(0, newLikes - 1); localStorage.removeItem(likedKey); }
            database.ref('posts/' + postId).update({ likes: newLikes });
        }

        function deletePost(postId) {
            if(confirm("Delete this post?")) {
                if(globalAudioInstances[postId]) {
                    globalAudioInstances[postId].pause();
                    delete globalAudioInstances[postId];
                }
                database.ref('posts/' + postId).remove();
            }
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            if(posts.length === 0) {
                container.innerHTML = `<div class="text-center py-16 bg-white border border-slate-200 rounded-2xl text-slate-400 font-bold text-xs uppercase tracking-widest shadow-sm">No Posts Available</div>`;
                return;
            }

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-none border border-slate-200 overflow-hidden text-left';
                
                // Header track indicator labels row
                let audioBadgeHeader = '';
                let cornerAudioTriggerHtml = '';

                if(post.music) {
                    audioBadgeHeader = `
                        <div class="flex items-center gap-1.5 bg-slate-100 text-slate-700 text-[10px] font-black px-2.5 py-1 rounded-full max-w-[220px] truncate">
                            <span class="animate-pulse">🎵</span>
                            <span class="truncate">${post.music.title} • ${post.music.artist}</span>
                        </div>
                    `;

                    cornerAudioTriggerHtml = `
                        <!-- Instagram Corner Absolute Control Trigger Shield -->
                        <div class="absolute bottom-3 right-3 z-10">
                            <button onclick="triggerInstaAudioToggle('${post.id}', '${post.music.audioUrl}')" 
                                    class="w-8 h-8 rounded-full bg-black/60 hover:bg-black/80 text-white flex items-center justify-center text-xs backdrop-blur-sm transition active:scale-90 shadow-md">
                                <span id="state-icon-${post.id}">🔇</span>
                            </button>
                        </div>
                    `;
                }

                // Media Frame Render Setup
                let mediaHtml = '';
                if(post.image) {
                    mediaHtml = `
                        <div class="relative bg-slate-50 border-y border-slate-100 flex items-center justify-center w-full overflow-hidden select-none">
                            <img src="${post.image}" class="w-full h-auto object-cover max-h-[500px]">
                            ${cornerAudioTriggerHtml}
                        </div>
                    `;
                } else if(post.music) {
                    // Fallback visual sound block frame if text post has background loop tracks assigned
                    mediaHtml = `
                        <div class="relative bg-gradient-to-b from-slate-50 to-slate-100 border-y border-slate-200/60 p-8 flex flex-col items-center justify-center text-center space-y-3 min-h-[220px]">
                            <img id="disk-${post.id}" src="${post.music.coverUrl}" class="w-20 h-20 rounded-full border-2 border-white shadow-xl object-cover">
                            <div class="text-slate-400 font-black text-[9px] uppercase tracking-widest italic">Instagram Sound Wave Loop Active</div>
                            ${cornerAudioTriggerHtml}
                        </div>
                    `;
                }

                // Dynamic Floating Overlay Lyrics Banner row conditional mapping
                let lyricsOverlayBanner = '';
                if(post.music && post.music.lyricsText) {
                    lyricsOverlayBanner = `
                        <div class="px-4 py-2 bg-rose-50/40 border-b border-slate-100 text-center font-bold text-xs text-rose-600 tracking-wide">
                            ${post.music.lyricsText}
                        </div>
                    `;
                }

                let deleteButtonHtml = '';
                if (post.creatorOwnerTokenId === activeUser || activeUser === MASTER_ADMIN_KEY) {
                    deleteButtonHtml = `<button onclick="deletePost('${post.id}')" class="text-xs font-bold text-slate-300 hover:text-red-500 transition px-2 py-1">Delete</button>`;
                }

                const hasLiked = localStorage.getItem('liked_' + post.id);
                const heartClass = hasLiked ? 'text-red-500 fill-red-500 animate-bounce' : 'text-slate-800 fill-none';

                card.innerHTML = `
                    <!-- Top User Strip -->
                    <div class="px-4 py-3 flex items-center justify-between border-b border-slate-100 bg-white">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 p-[1.5px] shrink-0 shadow-sm">
                                <div class="w-full h-full bg-white rounded-full flex items-center justify-center font-black text-[10px] text-slate-700 uppercase">
                                    ${post.userHandle ? post.userHandle.substring(0,2) : 'UI'}
                                </div>
                            </div>
                            <div class="truncate text-left flex flex-col sm:flex-row sm:items-center gap-1">
                                <h4 class="text-xs font-black text-slate-900 tracking-tight truncate">@${post.userHandle || 'user'}</h4>
                                ${audioBadgeHeader}
                            </div>
                        </div>
                        ${deleteButtonHtml}
                    </div>
                    
                    ${lyricsOverlayBanner}
                    ${mediaHtml}
                    
                    <!-- Action Icons Row Replica -->
                    <div class="px-4 pt-3 pb-1 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="toggleLike('${post.id}', ${post.likes || 0})" class="transition transform active:scale-125">
                                <svg class="w-6 h-6 ${heartClass}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                                </svg>
                            </button>
                            <svg class="w-5 h-5 text-slate-800 fill-none cursor-pointer" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12 3 7.582 7.03 4 12 4s9 3.582 9 8z"></path></svg>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${post.timestamp}</span>
                    </div>

                    <!-- Meta Count Text -->
                    <div class="px-4 pb-1 text-xs font-black text-slate-900 tracking-tight">
                        ${post.likes || 0} likes
                    </div>
                    
                    <!-- Caption Body Grid -->
                    <div class="px-4 pb-4 text-xs font-medium text-slate-700 leading-relaxed">
                        <span class="font-black text-slate-900 mr-2 uppercase tracking-tight">@${post.userHandle || 'user'}</span>${post.caption}
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
