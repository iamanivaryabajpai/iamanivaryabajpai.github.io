<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="grid md:grid-cols-3 gap-6 w-full max-w-5xl">
        
        <!-- 1. Monolith (Elegant) -->
        <div class="glass-effect p-8 rounded-2xl border border-white/10 hover:border-white transition">
            <h2 class="text-xl font-bold mb-4">MONOLITH</h2>
            <p class="text-gray-400 text-sm">Pure, minimal, and premium.</p>
        </div>

        <!-- 2. Terminal (Geeky) -->
        <div class="glass-effect p-8 rounded-2xl border border-green-900/30 hover:border-green-500 transition">
            <h2 class="text-xl font-bold mb-4 text-green-500 terminal-font">>_ TERMINAL</h2>
            <p class="text-gray-400 text-sm terminal-font">root@core:~$ initiate_load</p>
        </div>
