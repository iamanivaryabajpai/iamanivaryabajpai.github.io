<body>

    <main class="max-w-7xl mx-auto px-8 py-20">

        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-10">AI 3D<br>STUDIO</h1>
        
        <!-- Generator Section -->
        <div id="ai-generator" class="bg-gray-50 p-10 rounded-3xl mb-20">
            <h2 class="text-2xl font-bold mb-6">Generate Your Idea</h2>
            <input type="text" id="userName" placeholder="Your Name" class="w-full p-4 mb-4 rounded-xl border">

        <div id="hostPanel" class="p-10 bg-red-50 rounded-3xl border-2 border-red-200">

            <input type="file" id="imageInput" class="mb-4">
            <button onclick="uploadProject()" class="bg-red-600 text-white px-6 py-2 rounded-lg">Upload to Gallery</button>
        </div>
