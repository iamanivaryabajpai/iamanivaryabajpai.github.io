<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ANIVARYA RASOI - FULL CODE</title>
    <style>
        :root { --brand: #ff4f2b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; padding: 20px; }
        .app-container { max-width: 600px; margin: auto; }
        .app-card { background: white; border: 2px solid var(--brand); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--brand); font-weight: 800; }
        .recipe-box { margin-top: 20px; padding: 20px; background: #fff5f2; border-left: 6px solid var(--brand); border-radius: 12px; font-weight: 600; line-height: 1.6; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--brand); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e04526; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-card">
        <h2>👨‍🍳 AI Recipe Generator</h2>
        <input type="text" id="ing" placeholder="Samagri likhein (e.g., leftover rice, potato)">
        <button onclick="findRecipe()">Recipe Generate Karein</button>
        <div id="out" class="recipe-box">Result yahan aayega...</div>
    </div><div class="app-card">
        <h2>🚨 Cartoon Voice Alarm</h2>
        <select id="char">
            <option value="oggy">Oggy (High Pitch)</option>
            <option value="doraemon">Doraemon (Balanced)</option>
            <option value="shinchan">Shinchan (Funny)</option>
        </select>
        <button onclick="setAlarm()" style="background: #333;">Alarm Set Karein</button>
    </div>
</div>

<script>
    function findRecipe() {
        const i = document.getElementById('ing').value.toLowerCase();
        const out = document.getElementById('out');
        
        // Advanced logic matches your input specifically
        if (i.includes('rice') && i.includes('potato')) {
            out.innerHTML = "<b>Recipe: Ultimate Aloo-Rice Cutlet [Dhaba Style]</b><br><br>1. Leftover rice aur uble aloo ko mash karein.<br>2. Isme chat masala, namak, aur dhaniya mix karein.<br>3. Tikki banakar shallow fry karein.<br>4. <i>Ye recipe premium selection ka hissa hai!</i>";
        } else if (i.includes('bread') && i.includes('corn')) {
            out.innerHTML = "<b>Recipe: Ultimate Corn, Potato & Bread Fusion Toast</b><br><br>Mashed aloo mein sweet corn aur masala milakar bread par spread karein aur butter mein toast karein.";
        } else {
            out.innerHTML = "Kripya 'leftover rice, potato' jaisa combo likhein.";
        }
    }function setAlarm() {
        const char = document.getElementById('char').value;
        alert("Alarm set! 5 second wait karein...");
        
        setTimeout(() => {
            let text = "";
            let pitch = 1.0;
            let rate = 1.0;

            if (char === 'oggy') {
                text = "Zaldi dekho aake, khana jal raha hai, dakchki dakchki, me bahut bhookha hoon!";
                pitch = 1.9; rate = 1.4;
            } else if (char === 'doraemon') {
                text = "Nobita! Gadget nikalne se pehle gas band karo, khana jal gaya toh mummy bohot maarengi!";
                pitch = 1.2; rate = 1.1;
            } else {
                text = "Mizae san, jaldi aao varna khana koyla ban jayega! Hehehe!";
                pitch = 2.0; rate = 1.3;
            }
            
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'hi-IN';
            s.pitch = pitch;
            s.rate = rate;
            window.speechSynthesis.speak(s);
        }, 5000);
    }
</script>
</body>
</html>
