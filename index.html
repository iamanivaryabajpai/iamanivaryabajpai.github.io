<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anivarya Bajpai</title>
    <meta name="description" content="Official website of Anivarya Bajpai">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%); 
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        .pickup-line {
            background: linear-gradient(135deg, #fef08a 0%, #fef9c3 100%);
            border: 1px solid #fef08a;
            color: #854d0e;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 9999px;
            font-size: 0.95rem;
            margin-bottom: 24px;
            box-shadow: 0 4px 14px rgba(254, 240, 138, 0.4);
        }
        .name-text {
            font-size: 7vw;
            font-weight: 900;
            background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: -0.03em;
        }
        .bio-text {
            font-size: 1.25rem;
            color: #475569; 
            font-weight: 400;
            line-height: 1.8;
            max-width: 600px;
            width: 100%;
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.8);
            padding: 24px 40px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        @media (max-width: 640px) {
            .bio-text { font-size: 1rem; padding: 16px 24px; }
            .name-text { font-size: 12vw; }
        }
    </style>
</head>
<body>

    <!-- COOL PICKUP LINE BANNER -->
    <div class="pickup-line">
        Are you a stadium? Because my heart beats only when you're crowded with smiles! 😉✨
    </div>

    <!-- LIVE PHOTO BOX -->
    <div id="logo-container" class="mb-6 hidden">
        <div class="w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-tr from-slate-200 via-white to-slate-900 shadow-xl">
            <img id="dynamic-logo" src="" alt="Live Profile" class="w-full h-full object-cover rounded-full border-2 border-white">
        </div>
    </div>

    <div class="name-text">ANIVARYA BAJPAI</div>
    
    <div class="bio-text">
        14 years old | Living life my way.<br>
        Cricket is my rhythm, Virat Kohli is the vibe.<br>
        Born to bleed Red—RCB fan for life.
    </div>

    <!-- INPUT FORM AND POST SETUP -->
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2 text-left">Upload your photo</label>
            <input type="file" id="image-input" accept="image/*" 
                class="block w-full text-sm text-slate-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-slate-900 file:text-white
                hover:file:bg-slate-800
                cursor-pointer file:cursor-pointer transition-all" />
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2 text-left">Write Description</label>
            <textarea id="desc-input" placeholder="Apne baare me kuch likho..." rows="3" 
                class="w-full text-sm text-slate-700 p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900 resize-none bg-slate-50/50"></textarea>
        </div>

        <button id="post-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 px-4 rounded-xl transition-all shadow-md">
            Post Now
        </button>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const descInput = document.getElementById('desc-input');
        const postBtn = document.getElementById('post-btn');
        const logoContainer = document.getElementById('logo-container');
        const dynamicLogo = document.getElementById('dynamic-logo');

        // Restore automatically on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedImg = localStorage.getItem('user_photo');
            const savedDesc = localStorage.getItem('user_desc');
            if (savedImg) {
                dynamicLogo.src = savedImg;
                logoContainer.classList.remove('hidden');
            }
            if (savedDesc) {
                descInput.value = savedDesc;
            }
        });

        // Safe Execution Pipeline
        postBtn.addEventListener('click', function() {
            const file = imageInput.files[0];
            const textValue = descInput.value.trim();

            if (textValue) {
                localStorage.setItem('user_desc', textValue);
            }

            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgData = event.target.result;
                    try {
                        localStorage.setItem('user_photo', imgData);
                        dynamicLogo.src = imgData;
                        logoContainer.classList.remove('hidden');
                    } catch (error) {
                        // Safe fallback handling for extremely large images
                        dynamicLogo.src = imgData;
                        logoContainer.classList.remove('hidden');
                    }
                };
                reader.readAsDataURL(file);
            }
            
            alert("Posted Successfully!");
        });
    </script>

</body>
</html>
